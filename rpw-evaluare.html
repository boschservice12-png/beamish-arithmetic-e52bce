function resizeFile(file){
  return new Promise(function(res){
    var r=new FileReader();
    r.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas'),mx=1600,sc=img.width>mx?mx/img.width:1;
        c.width=img.width*sc;c.height=img.height*sc;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',.85));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}
async function uploadPhoto(photoKey,dataUrl){
  if(!JOB||!JOB.id)throw new Error('no job');
  S.uploading[photoKey]=true;render();
  try{
    var res=await fetch(dataUrl);var blob=await res.blob();
    var path=JOB.id+'/'+photoKey+'.jpg';
    var up=await sb.storage.from(STORAGE_BUCKET).upload(path,blob,{contentType:'image/jpeg',upsert:true});
    if(up.error)throw up.error;
    var url=sb.storage.from(STORAGE_BUCKET).getPublicUrl(path).data.publicUrl;
    if(!JOB.photoKeys)JOB.photoKeys={};
    if(!JOB.photoUrls)JOB.photoUrls={};
    JOB.photoKeys[photoKey]=true;JOB.photoUrls[photoKey]=url;S.photoCache[photoKey]=url;
    await saveJ();return url;
  }finally{delete S.uploading[photoKey];render()}
}
async function deletePhoto(photoKey){
  if(!JOB||!JOB.id)return;
  var path=JOB.id+'/'+photoKey+'.jpg';
  try{await sb.storage.from(STORAGE_BUCKET).remove([path])}catch(e){console.warn('Delete:',e)}
  if(JOB.photoKeys)delete JOB.photoKeys[photoKey];
  if(JOB.photoUrls)delete JOB.photoUrls[photoKey];
  delete S.photoCache[photoKey];await saveJ();
}
function photoUrl(photoKey){
  if(S.photoCache[photoKey])return S.photoCache[photoKey];
  if(JOB&&JOB.photoUrls&&JOB.photoUrls[photoKey]){S.photoCache[photoKey]=JOB.photoUrls[photoKey];return JOB.photoUrls[photoKey]}
  return null;
}

function gJI(){return new URLSearchParams(location.search).get('job')}

async function loadJob(){
  loadNorme();loadConfig();
  var jid=gJI();if(!jid){render();return}
  var cached=localStorage.getItem('rpw_job_'+jid);
  if(cached){try{JOB=JSON.parse(cached);initJob();render()}catch(e){}}
  try{
    var res=await sb.from('rpw_jobs').select('id,data,updated_at').eq('id',jid).single();
    if(res.error)throw res.error;
    var _lts=0,_sts=0;try{_lts=Date.parse(localStorage.getItem('rpw_job_ts_'+jid)||0)||0;_sts=Date.parse(res.data.updated_at||0)||0}catch(e){}
    if(!(JOB&&_lts&&_sts<=_lts)){JOB=res.data.data;
    try{localStorage.setItem('rpw_job_'+jid,JSON.stringify(JOB));localStorage.setItem('rpw_job_ts_'+jid,res.data.updated_at||new Date().toISOString())}catch(e){}}
    initJob();
    try{localStorage.setItem('rpw_job_'+jid,JSON.stringify(JOB))}catch(e){}
  }catch(e){if(!JOB)JOB=null}
  render();
}

function initJob(){
  if(!JOB)return;
  if(!JOB.phases)JOB.phases={};
  for(var p=1;p<=7;p++){if(!JOB.phases[p])JOB.phases[p]={status:'pending'}}
  if(!JOB.evalData)JOB.evalData={};
  if(!JOB.evalData.comanda)JOB.evalData.comanda=[];
  if(!JOB.evalData.upsell)JOB.evalData.upsell=[];
  if(JOB.evalData.comanda.length===0 && JOB.evalData.upsell.length===0){
    syncFromElements();
  }
}

function autoPopulate(){
  var el=JOB.elements||{};
  var cnt=0;
  for(var k in el){
    var e=el[k];
    var target=null;
    if(e.status==='damaged')target='comanda';
    else if(e.status==='suggested')target='upsell';
    if(!target)continue;
    // Olvasd ki az ops objektumot (checkbox alapu), backward compat a work/workV2 mezokre
    var ops=e.ops;
    if(!ops){
      ops={};
      var oldW=e.workV2||e.work;
      if(oldW==='replace'||oldW==='inlocuire'||oldW==='new')ops.inlocuire=true;
      else if(oldW==='fix'||oldW==='reparatie')ops.reparatie=true;
      else if(oldW==='vopsire'||oldW==='uni')ops.vopsire=true;
      else if(oldW==='revopsire')ops.revopsire=true;
    }
    // Ket kulon sor mindegy ami bekapcsolva van
    var opList=['inlocuire','demontat','dezasamblat','reparatie','vopsire','revopsire','mecanica'];
    var added=false;
    for(var oi=0;oi<opList.length;oi++){
      var op=opList[oi];
      if(ops[op]){
        var prefix=target==='comanda'?'c_':'u_';
        JOB.evalData[target].push({
          id:prefix+Date.now().toString(36)+'_'+(cnt++),
          elKey:k,
          op:op,
          hours:(op==='reparatie'&&e.oraNormata)?e.oraNormata:getNorma(k,op),
          note:e.note||'',
          photo:e.photo||null
        });
        added=true;
      }
    }
    // Fallback: ha nincs ops de damaged/suggested (regi adat) - egy sor ures muvelettel
    if(!added){
      var prefix2=target==='comanda'?'c_':'u_';
      JOB.evalData[target].push({
        id:prefix2+Date.now().toString(36)+'_'+(cnt++),
        elKey:k,op:'',hours:0,note:e.note||'',photo:e.photo||null
      });
    }
  }
}

function num(v){var n=parseFloat(v);return isNaN(n)?null:n}
function dataUrlToBase64(d){return d.split(',')[1]}
async function callOCR(b64,type){
  var resp=await fetch('/.netlify/functions/ocr',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:b64,type:type})});
  var data=await resp.json();
  if(!resp.ok)throw new Error(data.error||'OCR failed (HTTP '+resp.status+')');
  try{return JSON.parse(data.result)}catch(e){throw new Error('OCR result not JSON')}
}
window.importAudatex=function(e){
  var f=e.target.files&&e.target.files[0];if(!f)return;
  S.audatexRun=true;render();
  var r=new FileReader();
  r.onload=async function(ev){
    try{
      var p=await callOCR(dataUrlToBase64(ev.target.result),'audatex');
      JOB.audatex={
        ore_tinichigerie:num(p.ore_tinichigerie),
        ore_vopsitorie:num(p.ore_vopsitorie),
        pret_ora:num(p.pret_ora),
        total_manopera_ron:num(p.total_manopera_ron),
        total_vopsitorie_ron:num(p.total_vopsitorie_ron),
        total_piese_ron:num(p.total_piese_ron),
        total_cu_tva:num(p.total_cu_tva),
        nr_dosar:(p.nr_dosar&&p.nr_dosar!=='null')?p.nr_dosar:null,
        ts:new Date().toISOString()
      };
      S.audatexRun=false;await saveJ();
      toast('Audatex: T '+(JOB.audatex.ore_tinichigerie!=null?JOB.audatex.ore_tinichigerie+'h':'?')+' / V '+(JOB.audatex.ore_vopsitorie!=null?JOB.audatex.ore_vopsitorie+'h':'?'));
      render();
    }catch(err){S.audatexRun=false;toast('Audatex OCR: '+err.message,1);render()}
  };
  r.readAsDataURL(f);
};

function calcRowTotal(row){
  var tarifKey=row.tarifKey;
  if(!tarifKey){
    var op=OPS.find(function(x){return x.id===row.op});
    if(op)tarifKey=op.tarif;
  }
  if(!tarifKey)return 0;
  var tarif=CONFIG.tarif[tarifKey]||0;
  return (parseFloat(row.hours)||0)*tarif;
}
function calcListTotal(list){var sum=0;list.forEach(function(r){sum+=calcRowTotal(r)});return sum}

function render(){
  var ln=gL(),job=JOB;
  if(!job){
    document.getElementById('app').innerHTML='<div class="loading">'+T('noJob')+'<br><br><button style="margin-top:12px;padding:10px 24px;border:none;border-radius:10px;background:var(--r);color:#fff;font-weight:700;font-family:inherit;cursor:pointer" onclick="location.assign(\'index.html\')">Dashboard</button></div>';
    return;
  }

  var curList=curArr();
  var tvaPct=parseFloat(CONFIG.tarif.tva)||0;
  var ax=(S.tab==='comanda')?job.audatex:null;   // Audatex csak Lucrare tabon szamol
  var axMode=!!ax;
  var totalMan,totalVop,totalMat,totalFaraT,tvaVal,totalCuT;
  if(axMode){
    totalMan=ax.total_manopera_ron||0;
    totalVop=ax.total_vopsitorie_ron||0;
    totalMat=ax.total_piese_ron||0;
    totalFaraT=totalMan+totalVop+totalMat;
    totalCuT=(ax.total_cu_tva!=null)?ax.total_cu_tva:totalFaraT*(1+tvaPct/100);
    tvaVal=totalCuT-totalFaraT;
  }else{

  JOB.elements[k].status=stV2==='avariata'?'damaged':stV2==='recomandata'?'suggested':'ok';
  if(stV2==='ok'){
    JOB.elements[k].work=null;JOB.elements[k].workV2=null;
    JOB.elements[k].oraNormata=null;JOB.elements[k].note='';JOB.elements[k].ops={};
    if(JOB.photoKeys&&JOB.photoKeys['elem_'+k])await deletePhoto('elem_'+k);
  }
  await saveJ();render();
};
window.sEOp=async function(k,op){
  if(!JOB.elements||!JOB.elements[k])return;
  var e=JOB.elements[k];if(!e.ops)e.ops={};
  e.ops[op]=!e.ops[op];
  if(op==='inlocuire'&&e.ops.inlocuire)e.ops.reparatie=false;
  if(op==='reparatie'&&e.ops.reparatie)e.ops.inlocuire=false;
  if(op==='vopsire'&&e.ops.vopsire)e.ops.revopsire=false;
  if(op==='revopsire'&&e.ops.revopsire)e.ops.vopsire=false;
  if(e.ops.inlocuire)e.workV2='inlocuire';
  else if(e.ops.reparatie)e.workV2='reparatie';
  else if(e.ops.vopsire)e.workV2='vopsire';
  else if(e.ops.revopsire)e.workV2='revopsire';
  else e.workV2=null;
  e.work=WORK_V2_TO_V1[e.workV2]||null;
  await saveJ();render();
};

// ====== ADDITÍV SZINKRON: 23-elem → deviz (comanda/upsell) ======
function rowExists(list,refKey,op){return list.some(function(r){return (r.photoRef===refKey||r.elKey===refKey)&&r.op===op})}
function syncFromElements(){
  var el=JOB.elements||{},alt=JOB.alteParti||[];
  if(!JOB.evalData)JOB.evalData={};
  if(!JOB.evalData.comanda)JOB.evalData.comanda=[];
  if(!JOB.evalData.upsell)JOB.evalData.upsell=[];
  var added=0,cnt=0;
  function proc(key,e,isAlt){
    var s=e.statusV2||(e.status==='damaged'?'avariata':e.status==='suggested'?'recomandata':null);
    if(s!=='avariata'&&s!=='recomandata')return;
    var target=s==='avariata'?'comanda':'upsell';
    var list=JOB.evalData[target],prefix=target==='comanda'?'c_':'u_';
    var ref=isAlt?('alt_'+key):('elem_'+key);
    var ops=e.ops||{},opList=['inlocuire','demontat','dezasamblat','reparatie','vopsire','revopsire','mecanica'],anyOp=false;
    for(var oi=0;oi<opList.length;oi++){
      var op=opList[oi];
      if(ops[op]){anyOp=true;
        if(!rowExists(list,ref,op)){
          list.push({id:prefix+Date.now().toString(36)+'_'+(cnt++),elKey:isAlt?null:key,photoRef:ref,name:isAlt?(e.name||''):'',op:op,hours:(op==='reparatie'&&e.oraNormata)?e.oraNormata:getNorma(key,op),note:e.note||'',photo:null});added++;
        }
      }
    }
    if(!anyOp&&!rowExists(list,ref,'')){
      list.push({id:prefix+Date.now().toString(36)+'_'+(cnt++),elKey:isAlt?null:key,photoRef:ref,name:isAlt?(e.name||''):'',op:'',hours:0,note:e.note||'',photo:null});added++;
    }
  }
  for(var k in el)proc(k,el[k],false);
  for(var ai=0;ai<alt.length;ai++)proc(alt[ai].id,alt[ai],true);
  return added;
}
window.syncEval=async function(){
  var n=syncFromElements();
  await saveJ();
  toast(n>0?(T('syncDone')+' (+'+n+')'):T('syncNone'));
  render();
};

window.sendWA=function(){
  var phone=(JOB.phone||'').replace(/[^0-9+]/g,'');
  if(!phone||phone.length<6){phone=prompt('Telefon client (ex: 0740123456):','');if(!phone)return}
  phone=phone.replace(/[^0-9]/g,'');
  if(phone.length && phone[0]==='0')phone='40'+phone.slice(1);
  var msg=buildOfferText();
  var a=document.createElement('a');a.href='https://wa.me/'+phone+'?text='+encodeURIComponent(msg);a.target='_blank';a.rel='noopener';document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a)},100);
};

window.sendMail=function(){
  var to=JOB.email||prompt('Email destinatar:','');if(!to)return;
  var subj=(S.tab==='comanda'?'Comanda de lucru':'Oferta aftersales')+' — '+(JOB.plate||'')+' — '+(JOB.brand||JOB.auto||'');
  var body=buildOfferText().replace(/\*/g,'').replace(/_/g,'');
  var a=document.createElement('a');a.href='mailto:'+to+'?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body);document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a)},100);
};

function buildOfferText(){
  var job=JOB,list=JOB.evalData[curKey()];
  var m='*'+(S.tab==='comanda'?'COMANDA DE LUCRU':'OFERTA AFTERSALES')+'*\n';
  m+='*'+CONFIG.unitate.nume+'*\n';
  m+='CIF: '+CONFIG.unitate.cif+'\n';
  m+='Tel: '+CONFIG.unitate.tel+'\n\n';
  m+='Data: '+today()+'\n';
  m+='Dosar: '+(job.number||job.id)+'\n';
  if(job.nrDosar)m+='Dosar asig.: '+job.nrDosar+'\n';
  m+='\n🚗 '+(job.brand||job.auto||'')+' · '+(job.plate||'')+'\n';
  m+='VIN: '+(job.vin||'—')+'\n';
  m+='An: '+(job.year||'—')+'\n';
  m+='Client: '+(job.proprietar||job.client||'—')+'\n';
  if(job.asigurator)m+='Asig: '+job.asigurator+'\n';
  m+='\n';
  if(list.length===0){m+='(fara lucrari)\n'}
  else{
    list.forEach(function(r,i){
      var elN=r.elKey?T(r.elKey):(r.name||'—');
      var opN=r.op?TOP(r.op):'—';
      var tot=calcRowTotal(r);
      m+=(i+1)+'. '+elN+' — '+opN;
      if(r.hours)m+=' · '+r.hours+'h';
      if(tot)m+=' · '+fmt(tot)+' RON';
      m+='\n';
      if(r.note)m+='   ↳ '+r.note+'\n';
    });
  }
  var tmn=calcListTotal(list),tva=tmn*(parseFloat(CONFIG.tarif.tva)||0)/100,tcuT=tmn+tva;
  m+='\n────────────────\n';
  m+='Manopera: '+fmt(tmn)+' RON\n';
  m+='TVA '+CONFIG.tarif.tva+'%: '+fmt(tva)+' RON\n';
  m+='*TOTAL: '+fmt(tcuT)+' RON*\n\n';
  m+='📍 '+CONFIG.unitate.adresa;
  return m;
}

};
