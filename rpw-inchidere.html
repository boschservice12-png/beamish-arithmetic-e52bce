<script>

var SB_KEY=RPW_CFG.SB_KEY;
var sb=supabase.createClient(SB_URL,SB_KEY);
var JOB=null,S={ts:null,te:0,showExp:0,expSel:{talon:1,buletin:1,constatare:1,customDocs:1,overview:1,elements:1,closingPhotos:1,dataHTML:1},expLoading:0,expProgress:0};

// ════════════════════════════════════════════════════════════════
// FILE SYSTEM ACCESS API — mentes a szerviz PC-jenek mappajaba
// ────────────────────────────────────────────────────────────────
// IndexedDB-be mentjuk a directory handle-t (localStorage nem tudja).
// Eloszor a felhasznalo kivalasztja a Dosare mappat, utana a bongeszo
// megjegyzi (permission-nel egyutt).
// ════════════════════════════════════════════════════════════════
var FSAH_DB='rpw_fs_handles', FSAH_STORE='handles', FSAH_KEY='dosareFolder';

function idbOpen(){
  return new Promise(function(res,rej){
    var req=indexedDB.open(FSAH_DB,1);
    req.onupgradeneeded=function(){req.result.createObjectStore(FSAH_STORE)};
    req.onsuccess=function(){res(req.result)};
    req.onerror=function(){rej(req.error)};
  });
}
async function getDirHandle(){
  try{
    var db=await idbOpen();
    return await new Promise(function(res){
      var tx=db.transaction(FSAH_STORE,'readonly');
      var req=tx.objectStore(FSAH_STORE).get(FSAH_KEY);
      req.onsuccess=function(){res(req.result||null)};
      req.onerror=function(){res(null)};
    });
  }catch(e){return null}
}
async function saveDirHandle(handle){
  try{
    var db=await idbOpen();
    return await new Promise(function(res){
      var tx=db.transaction(FSAH_STORE,'readwrite');
      tx.objectStore(FSAH_STORE).put(handle,FSAH_KEY);
      tx.oncomplete=function(){res(true)};
      tx.onerror=function(){res(false)};
    });
  }catch(e){return false}
}
async function pickDosareFolder(){
  if(!window.showDirectoryPicker)return null;
  try{
    var handle=await window.showDirectoryPicker({mode:'readwrite',id:'rpwDosare',startIn:'documents'});
    await saveDirHandle(handle);
    return handle;
  }catch(e){return null} // user cancelled
}
async function ensurePermission(handle){
  if(!handle||!handle.queryPermission)return false;
  try{
    var p=await handle.queryPermission({mode:'readwrite'});
    if(p==='granted')return true;
    p=await handle.requestPermission({mode:'readwrite'});
    return p==='granted';
  }catch(e){return false}
}
// Visszatert ertek: {ok:true, path:'2026\\05\\file.zip'} vagy null
async function saveZipToDir(blob, fileName){
  if(!window.showDirectoryPicker)return null;
  try{
    var rootHandle=await getDirHandle();
    if(!rootHandle){
      rootHandle=await pickDosareFolder();
      if(!rootHandle)return null;
    }
    var ok=await ensurePermission(rootHandle);
    if(!ok){
      // permission elveszett, ujra kerjuk
      rootHandle=await pickDosareFolder();
      if(!rootHandle)return null;
    }
    var d=new Date();
    var year=String(d.getFullYear());
    var month=String(d.getMonth()+1).padStart(2,'0');
    var yearH=await rootHandle.getDirectoryHandle(year,{create:true});
    var monthH=await yearH.getDirectoryHandle(month,{create:true});
    var fileH=await monthH.getFileHandle(fileName,{create:true});
    var writable=await fileH.createWritable();
    await writable.write(blob);
    await writable.close();
    return {ok:true, path:year+'\\'+month+'\\'+fileName};
  }catch(e){
    console.error('saveZipToDir',e);
    return {ok:false, error:e.message||String(e)};
  }
}

function gJI(){return new URLSearchParams(location.search).get('job')}
async function loadJob(){
  var jid=gJI();if(!jid){render();return}
  var cached=localStorage.getItem('rpw_job_'+jid);
  if(cached){try{JOB=JSON.parse(cached);if(!JOB.phases)JOB.phases={};for(var p=1;p<=7;p++){if(!JOB.phases[p])JOB.phases[p]={status:"pending"}};render()}catch(e){}}
  try{
    var res=await sb.from('rpw_jobs').select('id,data,updated_at').eq('id',jid).single();
    if(res.error)throw res.error;
    var _lts=0,_sts=0;try{_lts=Date.parse(localStorage.getItem('rpw_job_ts_'+jid)||0)||0;_sts=Date.parse(res.data.updated_at||0)||0}catch(e){}
    if(!(JOB&&_lts&&_sts<=_lts)){JOB=res.data.data;if(!JOB.phases)JOB.phases={};for(var p=1;p<=7;p++){if(!JOB.phases[p])JOB.phases[p]={status:"pending"}};
    try{localStorage.setItem('rpw_job_'+jid,JSON.stringify(JOB));localStorage.setItem('rpw_job_ts_'+jid,res.data.updated_at||new Date().toISOString())}catch(e){}}
    try{localStorage.setItem('rpw_job_'+jid,JSON.stringify(JOB))}catch(e){}
    /* nincs auto-mentes betolteskor */
  }catch(e){if(!JOB)JOB=null}
  render();
}
var _saveTimer=null;
async function saveJ(){
  if(!JOB)return;
  try{localStorage.setItem('rpw_job_'+JOB.id,JSON.stringify(JOB));localStorage.setItem('rpw_job_ts_'+JOB.id,new Date().toISOString())}catch(e){}
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async function(){
    try{await sb.from('rpw_jobs').upsert({id:JOB.id,data:JOB,updated_at:new Date().toISOString()})}
    catch(e){console.error('Save:',e)}
  },500);
}

window.addPh=function(x,e){var f=e.target.files&&e.target.files[0];if(!f)return;resize(f,async function(d){if(!JOB.closingPhotos)JOB.closingPhotos=[];while(JOB.closingPhotos.length<=x)JOB.closingPhotos.push(null);JOB.closingPhotos[x]={data:d,label:VK[x],ts:new Date().toISOString()};await saveJ();toast(T(VK[x])+' OK');render()})};

window.closeJob=async function(){
  if(!JOB)return;
  var cl=JOB.closing||{},ph=JOB.closingPhotos||[];
  if(!cl.factura||!cl.devizRef||ph.length<5){toast(T('incomplete'),1);return}
  JOB.closing.closedAt=new Date().toISOString().slice(0,10);
  JOB.phases[7].status='done';JOB.phases[7].finished=new Date().toISOString();
  JOB.phase=7;
  await saveJ();
  toast(T('closed'));
  // 1-klikkes "Lezaras + Mentes" — automatikusan megnyitja az export modalt
  // a felhasznalo csak megerositi (minden be van pipalva alapertelmezesben)
  S.showExp=1;
  render();
};

// fetch publikus URL-rol blob-ba (a ZIP-be)
async function fetchBlob(url){
  try{var r=await fetch(url);if(!r.ok)return null;return await r.blob()}
  catch(e){console.error('fetchBlob',url,e);return null}
}
// base64 dataURL -> blob
function dataUrlToBlob(du){
  try{
    var arr=du.split(',');if(arr.length<2)return null;
    var mime=(arr[0].match(/:(.*?);/)||[])[1]||'image/jpeg';
    var bstr=atob(arr[1]);
    var n=bstr.length,u8=new Uint8Array(n);
    while(n--)u8[n]=bstr.charCodeAt(n);
    return new Blob([u8],{type:mime});
  }catch(e){return null}
}
// Egy kep "beszerzese" barhonnan (urls/keys/data)
async function getPhotoBlob(key){
  if(!JOB)return null;
  var urls=JOB.photoUrls||{},keys=JOB.photoKeys||{};
  if(urls[key]){var b=await fetchBlob(urls[key]);if(b)return b}
  // Ha nincs URL de van storage key, szerezd meg a publikus URL-t
  if(keys[key] && window.sb){
    try{var pub=sb.storage.from(RPW_CFG.BUCKET).getPublicUrl(keys[key]).data.publicUrl;var b2=await fetchBlob(pub);if(b2)return b2}catch(e){}
  }
  return null;
}

// Elemek fotok - regi formatumban photo mezo base64
function getElementPhotoBlob(e){
  if(e.photo && typeof e.photo==='string' && e.photo.indexOf('data:')===0){
    return dataUrlToBlob(e.photo);
  }
  return null;
}

window.doExportZip=async function(){
  if(!JOB||S.expLoading)return;
  if(typeof JSZip==='undefined'){toast('JSZip lipseste',1);return}
  S.expLoading=1;S.expProgress=5;render();

  var zip=new JSZip();
  var cl=JOB.closing||{};
  var plate=(JOB.plate||'').replace(/[\s]/g,'');
  var model=(JOB.brand||JOB.auto||'').replace(/\s+/g,'_');
  var date=cl.closedAt||new Date().toISOString().slice(0,10);
  var asig=(cl.asigurator||'').replace(/\s+/g,'_');
  var baseFileName=[plate,model,date,asig].filter(Boolean).join('_');

  try{
    // ── documente/ talon buletin constatare ──
    var docFolder=zip.folder('documente');

    if(S.expSel.talon){
      var b=await getPhotoBlob('photo_talon');
      if(b)docFolder.file('talon.jpg',b);
      S.expProgress=15;render();
    }
    if(S.expSel.buletin){
      var b=await getPhotoBlob('doc_buletin');
      if(b)docFolder.file('buletin.jpg',b);
      S.expProgress=22;render();
    }
    if(S.expSel.constatare){
      var b=await getPhotoBlob('doc_constatare');
      if(b)docFolder.file('constatare.jpg',b);
      S.expProgress=30;render();
    }

    // ── customDocs/ egyeb dokumentumok ──
    if(S.expSel.customDocs){
      var customDocs=JOB.customDocs||[];
      for(var ci=0;ci<customDocs.length;ci++){
        var cd=customDocs[ci];
        var cdKey='custdoc_'+cd.id;
        var b=await getPhotoBlob(cdKey);
        if(b){
          var safeName=(cd.name||'doc_'+(ci+1)).replace(/[^a-zA-Z0-9._-]/g,'_');
          docFolder.file(safeName+'.jpg',b);
        }
      }
      S.expProgress=40;render();
    }

    // ── fotografii_ansamblu/ 6 ovewiew ──
    if(S.expSel.overview){
      var ovFolder=zip.folder('fotografii_ansamblu');
      var ovKeys=[['ov_front','ansamblu_fata.jpg'],['ov_back','ansamblu_spate.jpg'],['ov_left','ansamblu_stanga.jpg'],['ov_right','ansamblu_dreapta.jpg'],['ov_serieCaros','serie_caroserie.jpg'],['ov_km','kilometraj.jpg']];
      for(var oi=0;oi<ovKeys.length;oi++){
        var b=await getPhotoBlob(ovKeys[oi][0]);
        if(b)ovFolder.file(ovKeys[oi][1],b);
      }
      S.expProgress=55;render();
    }

    // ── fotografii_elemente/ serult elem fotok ──
    if(S.expSel.elements){
      var elFolder=zip.folder('fotografii_elemente');
      var elements=JOB.elements||{};
      for(var ek in elements){
        var e=elements[ek];
        if(!e.photo)continue;
        var b=getElementPhotoBlob(e);
        if(!b){
          // Probald az ev Supabase URL-el (ha ilyen formatumba van)
          if(typeof e.photo==='string' && e.photo.indexOf('http')===0){
            b=await fetchBlob(e.photo);
          }
        }
        if(b)elFolder.file('element_'+ek+'.jpg',b);
      }
      S.expProgress=70;render();
    }

    // ── fotografii_reparat/ javitott auto ──

      var clFolder=zip.folder('fotografii_reparat');

      if(dr.suggested&&dr.suggested.length){
        html+='<h2>Elemente recomandate ('+dr.suggested.length+')</h2><table><tr><th>Element</th><th>Operatie</th><th>Obs.</th></tr>';
        dr.suggested.forEach(function(d){html+='<tr><td>'+(d.name||'')+'</td><td>'+(d.work||'')+'</td><td>'+(d.note||'')+'</td></tr>'});
        html+='</table>';
      }
      if(cl.note)html+='<h2>Observatii finale</h2><p>'+cl.note+'</p>';
      html+='<br><hr><p style="text-align:center;color:#999;font-size:10px">SC SZKALICZKI SERVICE SRL · RO16250445 · Str. Petki David, Nr.27/A, Sangeorgiu de Mures · Tel: 0265318020<br>Generat: '+new Date().toISOString().slice(0,19)+'</p>';
      html+='</body></html>';
      zip.file('raport.html',html);
      S.expProgress=85;render();
    }

    // ════════════════════════════════════════════════════════
    //  6 UJ MODUL JELENTES (B opcio: teljes backup)
    // ════════════════════════════════════════════════════════

    // ── deviz.html ──
    {
      var d=JOB.deviz||{}, evR=JOB.evalRows||[], afR=JOB.afterRows||[];
      var h=htmlHeader(T('mod_deviz'));
      h+='<h3>'+T('m_version')+': '+(JOB.devizCount||1)+'</h3>';
      h+='<h2>'+T('d_evalRows')+' ('+evR.length+')</h2>';
      h+=ifEmpty(evR);
      if(evR.length){
        h+='<table><tr><th>'+T('col_elem')+'</th><th>'+T('col_op')+'</th><th>'+T('col_hours')+'</th><th>'+T('col_note')+'</th></tr>';
        evR.forEach(function(r){h+='<tr><td>'+escHtml(r.name||r.elKey||'')+'</td><td>'+escHtml(r.op||'')+'</td><td>'+escHtml(r.hours||'')+'</td><td>'+escHtml(r.note||'')+'</td></tr>'});
        h+='</table>';
      }
      h+='<h2>'+T('d_afterRows')+' ('+afR.length+')</h2>';
      h+=ifEmpty(afR);
      if(afR.length){
        h+='<table><tr><th>'+T('col_elem')+'</th><th>'+T('col_op')+'</th><th>'+T('col_hours')+'</th><th>'+T('col_note')+'</th></tr>';
        afR.forEach(function(r){h+='<tr><td>'+escHtml(r.name||r.elKey||'')+'</td><td>'+escHtml(r.op||'')+'</td><td>'+escHtml(r.hours||'')+'</td><td>'+escHtml(r.note||'')+'</td></tr>'});
        h+='</table>';
      }
      h+=htmlFooter();
      zip.file('deviz.html',h);
    }

    // ── evaluare.html ──
    {
      var ev=JOB.evalData||{}, elements=JOB.elements||{};
      var elKeys=Object.keys(elements).filter(function(k){return elements[k].status==='damaged'||elements[k].status==='suggested'});
      var h=htmlHeader(T('mod_eval'));
      h+='<h2>'+T('mod_eval')+' — '+T('damaged')+'/'+T('suggested')+' ('+elKeys.length+')</h2>';
      h+=ifEmpty(elKeys);
      if(elKeys.length){
        h+='<table><tr><th>'+T('col_elem')+'</th><th>'+T('col_status')+'</th><th>'+T('col_op')+'</th><th>'+T('col_hours')+'</th><th>'+T('col_note')+'</th></tr>';
        elKeys.forEach(function(k){
          var e=elements[k]||{};
          h+='<tr><td>'+escHtml(k)+'</td><td>'+escHtml(e.status||'')+'</td><td>'+escHtml(e.op||e.work||'')+'</td><td>'+escHtml(e.hours||'')+'</td><td>'+escHtml(e.note||'')+'</td></tr>';
        });
        h+='</table>';
      }
      if(ev && Object.keys(ev).length){
        h+='<h3>Date evaluare (raw)</h3><pre style="background:#f5f5f3;padding:8px;font-size:10px;overflow:auto;border:1px solid #ddd">'+escHtml(JSON.stringify(ev,null,2))+'</pre>';
      }
      h+=htmlFooter();
      zip.file('evaluare.html',h);
    }

    // ── reconstatare.html + fotografii_reconstatare/ ──
    {
      var rc=JOB.reconst||{}, rRows=rc.rows||[], rDocs=rc.docs||{}, rPhotos=JOB.reconstPhotos||[];
      var h=htmlHeader(T('mod_reconstM'));
      h+='<h2>'+T('mod_reconstM')+' ('+rRows.length+')</h2>';
      h+=ifEmpty(rRows);
      if(rRows.length){
        h+='<table><tr><th>'+T('col_nr')+'</th><th>'+T('col_name')+'</th><th>'+T('col_op')+'</th><th>'+T('col_hours')+'</th><th>'+T('r_tipAvarie')+'</th><th>'+T('r_pozAsig')+'</th></tr>';
        rRows.forEach(function(r){h+='<tr><td>'+escHtml(r.nr||'')+'</td><td>'+escHtml(r.name||'')+'</td><td>'+escHtml(r.op||'')+'</td><td>'+escHtml(r.hours||'')+'</td><td>'+escHtml(r.tipAvarie||'')+'</td><td>'+escHtml(r.pozAsig||'')+'</td></tr>'});
        h+='</table>';
      }
      if(rDocs && Object.keys(rDocs).length){
        h+='<h2>'+T('r_docs')+'</h2><pre style="background:#f5f5f3;padding:8px;font-size:10px;overflow:auto;border:1px solid #ddd">'+escHtml(JSON.stringify(rDocs,null,2))+'</pre>';
      }
      h+='<h2>'+T('r_photos')+' ('+rPhotos.filter(function(p){return p&&p.data}).length+')</h2>';
      h+='<p style="color:#666;font-size:11px">Vezi mapa <code>fotografii_reconstatare/</code></p>';
      h+=htmlFooter();
      zip.file('reconstatare.html',h);

      // Fotók kibontása base64-bol
      var rcFolder=zip.folder('fotografii_reconstatare');
      var rcCnt=0;
      for(var ri=0;ri<rPhotos.length;ri++){
        var b=getReconstPhotoBlob(rPhotos[ri]);
        if(b){rcCnt++;rcFolder.file('reconst_'+String(rcCnt).padStart(2,'0')+'.jpg',b)}
      }
    }

    // ── tinichigerie.html ──
    {
      var bR=JOB.bodyRows||[], bA=JOB.bodyApproval||null;
      var h=htmlHeader(T('mod_tin'));
      h+='<h2>'+T('mod_tin')+' ('+bR.length+')</h2>';
      h+=ifEmpty(bR);
      if(bR.length){
        h+='<table><tr><th>'+T('col_name')+'</th><th>'+T('t_bodyType')+'</th><th>'+T('col_hours')+'</th><th>'+T('col_note')+'</th></tr>';
        bR.forEach(function(r){h+='<tr><td>'+escHtml(r.name||'')+'</td><td>'+escHtml(r.bodyType||'')+'</td><td>'+escHtml(r.hours||'')+'</td><td>'+escHtml(r.note||'')+'</td></tr>'});
        h+='</table>';
      }
      if(bA){h+='<h3>'+T('t_approval')+'</h3><pre style="background:#f5f5f3;padding:8px;font-size:10px;overflow:auto;border:1px solid #ddd">'+escHtml(JSON.stringify(bA,null,2))+'</pre>'}
      h+=htmlFooter();
      zip.file('tinichigerie.html',h);
    }

    // ── vopsitorie.html ──
    {
      var pR=JOB.paintRows||[], pA=JOB.paintApproval||null;
      var h=htmlHeader(T('mod_vop'));
      h+='<h2>'+T('mod_vop')+' ('+pR.length+')</h2>';
      h+=ifEmpty(pR);
      if(pR.length){
        h+='<table><tr><th>'+T('col_name')+'</th><th>'+T('v_paintType')+'</th><th>'+T('v_vopsire')+'</th><th>'+T('col_hours')+'</th><th>'+T('col_note')+'</th></tr>';
        pR.forEach(function(r){h+='<tr><td>'+escHtml(r.name||'')+'</td><td>'+escHtml(r.paintType||'')+'</td><td>'+(r.vopsire?'✓':'—')+'</td><td>'+escHtml(r.hours||'')+'</td><td>'+escHtml(r.note||'')+'</td></tr>'});
        h+='</table>';
      }
      if(pA){h+='<h3>'+T('v_approval')+'</h3><pre style="background:#f5f5f3;padding:8px;font-size:10px;overflow:auto;border:1px solid #ddd">'+escHtml(JSON.stringify(pA,null,2))+'</pre>'}
      h+=htmlFooter();
      zip.file('vopsitorie.html',h);
    }

    // ── control.html ──
    {
      var cc=JOB.controlChecks||{};
      var h=htmlHeader(T('mod_ctrl'));
      // Osszegzes
      var ok=0,nok=0,na=0,pend=0,tot=0;
      Object.keys(cc).forEach(function(k){
        if(k.indexOf('_note')>=0)return;
        tot++;
        var v=cc[k];
        if(v==='ok')ok++;
        else if(v==='nok')nok++;
        else if(v==='na')na++;
        else pend++;
      });
      h+='<h2>'+T('c_summary')+'</h2>';
      h+='<table><tr><th>'+T('col_total')+'</th><th class="ok">'+T('c_ok')+'</th><th class="nok">'+T('c_nok')+'</th><th class="na">'+T('c_na')+'</th><th class="pend">'+T('c_pending')+'</th></tr>';
      h+='<tr><td><b>'+tot+'</b></td><td class="ok">'+ok+'</td><td class="nok">'+nok+'</td><td class="na">'+na+'</td><td class="pend">'+pend+'</td></tr></table>';
      h+='<p><b>'+(nok===0?T('c_passed'):T('c_failed'))+'</b></p>';
      // Reszletes lista
      h+='<h2>'+T('mod_ctrl')+' — '+T('c_check')+'</h2>';
      var keys=Object.keys(cc).filter(function(k){return k.indexOf('_note')<0});
      if(!keys.length){
        h+=ifEmpty([]);
      }else{
        h+='<table><tr><th>ID</th><th>'+T('col_status')+'</th><th>'+T('col_note')+'</th></tr>';
        keys.forEach(function(k){
          var v=cc[k]||'';
          var cls=v==='ok'?'ok':(v==='nok'?'nok':(v==='na'?'na':'pend'));
          var label=v==='ok'?T('c_ok'):(v==='nok'?T('c_nok'):(v==='na'?T('c_na'):T('c_pending')));
          var note=cc[k+'_note']||'';
          h+='<tr><td>'+escHtml(k)+'</td><td class="'+cls+'">'+escHtml(label)+'</td><td>'+escHtml(note)+'</td></tr>';
        });
        h+='</table>';
      }
      h+=htmlFooter();
      zip.file('control.html',h);
    }

    S.expProgress=90;render();

    // Generalj ZIP-et
    var blob=await zip.generateAsync({type:'blob',compression:'DEFLATE'},function(meta){S.expProgress=90+Math.round(meta.percent/10);render()});
    S.expProgress=100;render();

    var zipName=baseFileName+'.zip';

    // UJ: probaljuk a File System Access API-t (szervezett mappa, ev/honap)
    var saveResult=await saveZipToDir(blob, zipName);
    if(saveResult && saveResult.ok){
      // Sikeres mentes a kivalasztott mappaba
      S.expLoading=0;S.showExp=0;
      toast(T('savedToDisk')+': '+saveResult.path);
      render();
    }else{
      // Fallback: bongeszo Downloads mappaja
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=zipName;
      a.click();
      setTimeout(function(){URL.revokeObjectURL(a.href)},1000);
      S.expLoading=0;S.showExp=0;
      // Ha hiba volt a mentesben (nem user-cancel), jelezzuk
      if(saveResult && saveResult.error){
        toast(T('saveError')+' — '+T('savedFallback'),1);
      }else{
        toast(T('savedFallback'));
      }
      render();
    }
  }catch(err){
    console.error('Export ZIP:',err);
    S.expLoading=0;
    toast('Eroare: '+(err.message||err),1);
    render();
  }
};

// Regi exportDosar -> backcompat, de most a modal-t nyitja
window.exportDosar=function(){window.openExport()};

loadJob();
</script>
</body>
</html>
