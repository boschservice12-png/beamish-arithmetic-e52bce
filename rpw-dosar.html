<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23dc2626'/><circle cx='50' cy='50' r='18' fill='%23fff'/></svg>" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#dc2626">
<title>RedAssistance — Dosar Auto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="rpw-config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f3;--w:#fff;--r:#dc2626;--r50:#fef2f2;--r100:#fee2e2;--r700:#b91c1c;--g:#16a34a;--gl:#dcfce7;--y:#ca8a04;--yl:#fef9c3;--bl:#2563eb;--bll:#dbeafe;--p:#7c3aed;--pl:#ede9fe;--or:#ea580c;--orl:#fff7ed;--tl:#0d9488;--tll:#ccfbf1;--t:#1a1a1a;--t2:#555;--t3:#999;--b:#e5e5e5;--b2:#d0d0d0;--rd:10px}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.sticky-top{position:sticky;top:0;z-index:50;background:var(--w)}
.hdr{background:var(--w);border-bottom:1px solid var(--b);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:8px}
.back{width:32px;height:32px;border-radius:8px;border:1px solid var(--b);background:var(--w);display:flex;align-items:center;justify-content:center;cursor:pointer}
.back svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:2}
.hdr-title{font-size:14px;font-weight:800}.hdr-title span{color:var(--r)}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-job{text-align:right;font-size:11px;line-height:1.3}.hdr-job b{font-size:12px}
.lsw{display:flex;border:1px solid var(--b);border-radius:6px;overflow:hidden}
.lb{padding:4px 8px;font-size:9px;font-weight:700;cursor:pointer;border:none;background:var(--w);color:var(--t3);font-family:inherit}.lb.on{background:var(--r);color:#fff}.lb:not(:last-child){border-right:1px solid var(--b)}
.phase-nav{display:flex;gap:4px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--w);border-bottom:1px solid var(--b)}
.pn-btn{padding:6px 12px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid var(--b);background:var(--w);color:var(--t3);white-space:nowrap;font-family:inherit}
.pn-active{background:var(--r);color:#fff;border-color:var(--r)}
.pn-wait{background:var(--y);color:#fff;border-color:var(--y)}
.pn-done{background:var(--g);color:#fff;border-color:var(--g)}
.sec{margin:8px 16px 0;background:var(--w);border:1px solid var(--b);border-radius:var(--rd);overflow:hidden}
.sec-h{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}.sec-h:active{background:var(--bg)}
.sec-t{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.sec-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px}
.sb-ok{background:var(--gl);color:var(--g)}.sb-nd{background:var(--r100);color:var(--r)}.sb-pt{background:var(--yl);color:var(--y)}
.sec-bd{padding:0 14px 14px;display:none}.sec-bd.open{display:block}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--r);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.ff{background:var(--bg);border:1px solid var(--b);border-radius:6px;padding:6px 8px}
.ff-l{font-size:8px;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;font-weight:600;margin-bottom:1px}
.ff-v{font-size:13px;font-weight:700;color:var(--t)}
.type-badge{display:inline-block;padding:6px 16px;border-radius:var(--rd);font-size:12px;font-weight:800;margin-bottom:8px}
.type-asig{background:var(--bll);color:var(--bl);border:2px solid var(--bl)}
.type-auto{background:var(--orl);color:var(--or);border:2px solid var(--or)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pslot{background:var(--bg);border:1px solid var(--b);border-radius:8px;aspect-ratio:4/3;overflow:hidden;position:relative}
.pslot img{width:100%;height:100%;object-fit:cover}
.pslot-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:9px;font-weight:700;padding:3px 6px;text-align:center}
.doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.doc-card{background:var(--bg);border:1px solid var(--b);border-radius:8px;overflow:hidden}
.doc-card img{width:100%;aspect-ratio:4/3;object-fit:cover}
.doc-card-t{padding:4px 8px;font-size:10px;font-weight:700;text-align:center}
.el-list{display:flex;flex-direction:column;gap:4px}
.el{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.el.el-ok{border-color:var(--g);background:var(--gl)}.el.el-dmg{border-color:var(--r);background:var(--r50)}.el.el-sug{border-color:var(--or);background:var(--orl)}
.el-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.es-ok{background:var(--g)}.es-dmg{background:var(--r)}.es-sug{background:var(--or)}
.el-name{font-size:11px;font-weight:700;flex:1}
.el-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px}
.et-ok{background:var(--gl);color:var(--g)}.et-dmg{background:var(--r100);color:var(--r)}.et-sug{background:var(--orl);color:var(--or)}
.el-work{font-size:9px;color:var(--t3);font-weight:600}
.el-photo{width:50px;height:38px;border-radius:4px;object-fit:cover;border:1px solid var(--b);flex-shrink:0;cursor:pointer}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;cursor:pointer}
.lightbox img{max-width:92vw;max-height:90vh;border-radius:8px;object-fit:contain}
.el-note{font-size:10px;color:var(--t2);margin-top:2px}
.el-detail{display:flex;flex-direction:column;gap:2px;flex:1}
.empty{text-align:center;padding:30px;color:var(--t3);font-size:12px}
.toast{position:fixed;bottom:20px;left:16px;right:16px;background:var(--w);padding:11px 14px;border-radius:var(--rd);font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.12);border-left:4px solid var(--g);z-index:250}
.bpad{height:24px}.loading{text-align:center;padding:60px;color:var(--t3);font-size:14px}
@media(max-width:480px){.pgrid{grid-template-columns:1fr 1fr}}
@media print{.hdr,.phase-nav,.lsw{display:none!important}.sec{margin:4px 0;break-inside:avoid}body{background:#fff}}
</style>
</head>
<body>
<div id="app"><div class="loading">Se incarca...</div></div>
<script>
var SB_URL=RPW_CFG.SB_URL;
var SB_KEY=RPW_CFG.SB_KEY;
var sb=supabase.createClient(SB_URL,SB_KEY);
var JOB=null;
var S={sec:{client:1,auto:1,talon:0,docs:0,photos:1,elems:1}};

function gJI(){return new URLSearchParams(location.search).get('job')}
async function loadJob(){
  var jid=gJI();if(!jid){render();return}
  var cached=localStorage.getItem('rpw_job_'+jid);
  if(cached){try{JOB=JSON.parse(cached);if(!JOB.phases)JOB.phases={};for(var p=1;p<=7;p++){if(!JOB.phases[p])JOB.phases[p]={status:"pending"}};render()}catch(e){}}
  try{
    var res=await sb.from('rpw_jobs').select('id,data,updated_at').eq('id',jid).single();
    if(res.error)throw res.error;
    var _lts=0,_sts=0;try{_lts=Date.parse(localStorage.getItem('rpw_job_ts_'+jid)||0)||0;_sts=Date.parse(res.data.updated_at||0)||0}catch(e){}
    if(!(JOB&&_lts&&_sts<=_lts)){JOB=res.data.data;if(!JOB.phases)JOB.phases={};for(var p=1;p<=7;p++){if(!JOB.phases[p])JOB.phases[p]={status:"pending"}};
    try{localStorage.setItem('rpw_job_'+jid,JSON.stringify(JOB));localStorage.setItem('rpw_job_ts_'+jid,res.data.updated_at||new Date().toISOString())}catch(e){}}
    try{localStorage.setItem('rpw_job_'+jid,JSON.stringify(JOB))}catch(e){}
  }catch(e){if(!JOB)JOB=null}
  render();
}

var EK=['fb','rb','hood','trunk','roof','fl_f','fr_f','rl_f','rr_f','fl_d','fr_d','rl_d','rr_d','l_s','r_s','l_m','r_m','a_l','a_r','b_l','b_r','c_l','c_r'];
var VK=['front','back','left','right','serieCaros','km'];
var EK_NAMES={fb:{ro:'Bara fata',en:'Front bumper',hu:'Elso lokh.'},rb:{ro:'Bara spate',en:'Rear bumper',hu:'Hatso lokh.'},hood:{ro:'Capota',en:'Hood',hu:'Motorhazt.'},trunk:{ro:'Portbagaj',en:'Trunk',hu:'Csomagtarto'},roof:{ro:'Plafon',en:'Roof',hu:'Teto'},fl_f:{ro:'Aripa stg fata',en:'LF fender',hu:'BE sarvedo'},fr_f:{ro:'Aripa dr fata',en:'RF fender',hu:'JE sarvedo'},rl_f:{ro:'Aripa stg spate',en:'LR fender',hu:'BH sarvedo'},rr_f:{ro:'Aripa dr spate',en:'RR fender',hu:'JH sarvedo'},fl_d:{ro:'Usa stg fata',en:'LF door',hu:'BE ajto'},fr_d:{ro:'Usa dr fata',en:'RF door',hu:'JE ajto'},rl_d:{ro:'Usa stg spate',en:'LR door',hu:'BH ajto'},rr_d:{ro:'Usa dr spate',en:'RR door',hu:'JH ajto'},l_s:{ro:'Prag stg',en:'L sill',hu:'B kuszob'},r_s:{ro:'Prag dr',en:'R sill',hu:'J kuszob'},l_m:{ro:'Ogl. stg',en:'L mirror',hu:'B tukor'},r_m:{ro:'Ogl. dr',en:'R mirror',hu:'J tukor'},a_l:{ro:'Stalp A stg',en:'L A-pil.',hu:'B A oszl.'},a_r:{ro:'Stalp A dr',en:'R A-pil.',hu:'J A oszl.'},b_l:{ro:'Stalp B stg',en:'L B-pil.',hu:'B B oszl.'},b_r:{ro:'Stalp B dr',en:'R B-pil.',hu:'J B oszl.'},c_l:{ro:'Stalp C stg',en:'L C-pil.',hu:'B C oszl.'},c_r:{ro:'Stalp C dr',en:'R C-pil.',hu:'J C oszl.'}};

var i={dosar:{ro:'Dosar Auto',en:'Vehicle File',hu:'Auto Akta'},noJob:{ro:'Nu exista lucrare',en:'No job',hu:'Nincs munka'},openD:{ro:'Dashboard',en:'Dashboard',hu:'Dashboard'},
client:{ro:'Date client',en:'Client info',hu:'Ugyfel'},name:{ro:'Nume',en:'Name',hu:'Nev'},phone:{ro:'Telefon',en:'Phone',hu:'Tel'},note:{ro:'Obs.',en:'Notes',hu:'Megj.'},tipDauna:{ro:'Tip dauna',en:'Damage type',hu:'Kartipus'},asig:{ro:'Dauna asigurare',en:'Insurance',hu:'Biztositos'},autoD:{ro:'Dauna auto',en:'Self-paid',hu:'Magankar'},
auto:{ro:'Date vehicul',en:'Vehicle data',hu:'Jarmu adatok'},plate:{ro:'Nr. inmatr.',en:'Plate',hu:'Rendszam'},proprietar:{ro:'Proprietar',en:'Owner',hu:'Tulajdonos'},vin:{ro:'Serie sasiu',en:'VIN',hu:'VIN'},km:{ro:'Kilometraj',en:'Odometer',hu:'Km ora'},brand:{ro:'Marca',en:'Brand',hu:'Marka'},year:{ro:'An',en:'Year',hu:'Ev'},
talon:{ro:'Talon scanat',en:'Scanned card',hu:'Talon'},docs:{ro:'Documente',en:'Documents',hu:'Dokumentumok'},photos:{ro:'Fotografii ansamblu',en:'Overview photos',hu:'Attekintos fotok'},
elems:{ro:'Evaluare elemente',en:'Element assessment',hu:'Elem ertekeles'},ok:{ro:'OK',en:'OK',hu:'OK'},dmg:{ro:'Avariat',en:'Damaged',hu:'Serult'},sug:{ro:'Recomandat',en:'Suggested',hu:'Ajanlott'},
front:{ro:'Fata',en:'Front',hu:'Elol'},back:{ro:'Spate',en:'Rear',hu:'Hatul'},left:{ro:'Stanga',en:'Left',hu:'Bal'},right:{ro:'Dreapta',en:'Right',hu:'Jobb'},serieCaros:{ro:'Serie caroserie',en:'Body serial',hu:'Karossz.'},kmPhoto:{ro:'Kilometraj',en:'Odometer',hu:'Km ora'},
permisFata:{ro:'Permis fata',en:'License front',hu:'Jogositvany elol'},permisVerso:{ro:'Permis verso',en:'License back',hu:'Jogositvany hatul'},constatare:{ro:'Constatare / PV',en:'Report / PV',hu:'Jkv / PV'},declaratieDauna:{ro:'Declaratie dauna',en:'Damage decl.',hu:'Karbejelentes'},buletin:{ro:'Buletin',en:'ID card',hu:'Buletin'},imputernicire:{ro:'Imputernicire',en:'Auth.',hu:'Felhatalm.'},politaRca:{ro:'Polita RCA',en:'RCA Policy',hu:'RCA kotveny'},politaCasco:{ro:'Polita CASCO',en:'CASCO Policy',hu:'CASCO kotveny'},
newP:{ro:'Nou',en:'New',hu:'Uj'},oldP:{ro:'Vechi',en:'Old',hu:'Regi'},replace:{ro:'Inlocuire',en:'Replace',hu:'Csere'},fix:{ro:'Reparatie',en:'Repair',hu:'Javitas'},uni:{ro:'Uniform.',en:'Uniform.',hu:'Uniform.'},
ph1:{ro:'Receptie',en:'Reception',hu:'Recepcio'},ph2:{ro:'Evaluare',en:'Assessment',hu:'Karfelmeres'},ph3:{ro:'Reconstatare',en:'Re-assess.',hu:'Ujrafelm.'},ph4:{ro:'Tinichigerie',en:'Bodywork',hu:'Lakatos'},ph5:{ro:'Vopsitorie',en:'Paint',hu:'Festode'},ph6:{ro:'Control',en:'Check',hu:'Kontrol'},ph7:{ro:'Inchis',en:'Closed',hu:'Lezart'}};

function gL(){return localStorage.getItem('rpw_lang')||'ro'}
function sL(l){localStorage.setItem('rpw_lang',l);render()}
function T(k){var e=i[k]||EK_NAMES[k];return e?e[gL()]||e.ro||k:k}

var PHASE_PAGES={1:'rpw-recepcio.html',2:'rpw-evaluare.html',3:'rpw-reconstatare.html',4:'rpw-tinichigerie.html',5:'rpw-vopsitorie.html',6:'rpw-control.html',7:'rpw-inchidere.html'};

function render(){
  var ln=gL(),job=JOB;
  if(!job){document.getElementById('app').innerHTML='<div class="loading">'+T('noJob')+'<br><br><button style="margin-top:12px;padding:10px 24px;border:none;border-radius:10px;background:var(--r);color:#fff;font-weight:700;font-family:inherit;cursor:pointer" onclick="location.assign(\'index.html\')">'+T('openD')+'</button></div>';return}

  var ph=job.photos||[],docs=job.docs||[],el=job.elements||{},ovP=ph.filter(function(p){return p.type==='overview'}),tP=ph.find(function(p){return p.type==='talon'});
  var elC=0,dmgC=0,okC=0,sugC=0;for(var k in el){elC++;if(el[k].status==='ok')okC++;if(el[k].status==='damaged')dmgC++;if(el[k].status==='suggested')sugC++}

  var h='<div class="sticky-top"><div class="hdr"><div class="hdr-left"><div class="back" onclick="location.assign(\'index.html\')"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div><div class="hdr-title"><span>Red</span> '+T('dosar')+'</div></div><div class="hdr-right"><div class="hdr-job"><b class="mono">'+(job.number||job.id)+'</b><br><span style="color:var(--t3)">'+(job.plate||'')+' · '+(job.auto||'')+'</span></div><div class="lsw"><button class="lb '+(ln==='ro'?'on':'')+'" onclick="sL(\'ro\')">RO</button><button class="lb '+(ln==='en'?'on':'')+'" onclick="sL(\'en\')">EN</button><button class="lb '+(ln==='hu'?'on':'')+'" onclick="sL(\'hu\')">HU</button></div></div></div>';

  // Phase navigation
  h+='<div class="phase-nav">';
  for(var p=1;p<=7;p++){
    var isAct=job.phase===p,isDone=job.phase>p,cls='pn-btn';
    // Status colors: done=green, active=red(or yellow for reconst), future=grey
    if(isDone)cls+=' pn-done';
    else if(isAct)cls+=' '+(p===3?'pn-wait':'pn-active');
    var pg=PHASE_PAGES[p];
    h+='<button class="'+cls+'" '+(pg?'onclick="location.assign(\''+pg+'?job='+job.id+'\')"':'')+' >'+(isDone?'✓ ':isAct?'● ':'')+T('ph'+p)+'</button>';
  }
  h+='</div></div>';

  // Client info
  h+='<div class="sec"><div class="sec-h" onclick="tS(\'client\')"><div class="sec-t"><span class="step-n">C</span> '+T('client')+'</div></div><div class="sec-bd '+(S.sec.client?'open':'')+'"><div class="type-badge '+(job.damageType==='asig'?'type-asig':'type-auto')+'">'+(job.damageType==='asig'?T('asig'):T('autoD'))+'</div><div class="fg"><div class="ff"><div class="ff-l">'+T('name')+'</div><div class="ff-v">'+(job.client||'—')+'</div></div><div class="ff"><div class="ff-l">'+T('phone')+'</div><div class="ff-v">'+(job.phone||'—')+'</div></div></div><div class="fg"><div class="ff" style="grid-column:1/3"><div class="ff-l">'+T('note')+'</div><div class="ff-v" style="font-weight:500">'+(job.note||'—')+'</div></div></div></div></div>';

  // Auto
  h+='<div class="sec"><div class="sec-h" onclick="tS(\'auto\')"><div class="sec-t"><span class="step-n">A</span> '+T('auto')+'</div></div><div class="sec-bd '+(S.sec.auto?'open':'')+'"><div class="fg"><div class="ff"><div class="ff-l">'+T('plate')+'</div><div class="ff-v mono" style="font-size:24px;font-weight:800">'+(job.plate||'—')+'</div></div><div class="ff"><div class="ff-l">'+T('proprietar')+'</div><div class="ff-v">'+(job.proprietar||'—')+'</div></div></div><div class="fg"><div class="ff"><div class="ff-l">'+T('vin')+'</div><div class="ff-v mono">'+(job.vin||'—')+'</div></div><div class="ff"><div class="ff-l">'+T('km')+'</div><div class="ff-v mono">'+(job.km||'—')+'</div></div></div><div class="fg"><div class="ff"><div class="ff-l">'+T('brand')+'</div><div class="ff-v">'+(job.brand||job.auto||'—')+'</div></div><div class="ff"><div class="ff-l">'+T('year')+'</div><div class="ff-v mono">'+(job.year||'—')+'</div></div></div></div></div>';

  // Talon
  h+='<div class="sec"><div class="sec-h" onclick="tS(\'talon\')"><div class="sec-t"><span class="step-n">1</span> '+T('talon')+'</div><span class="sec-badge '+(tP?'sb-ok':'sb-nd')+'">'+(tP?'OK':'—')+'</span></div><div class="sec-bd '+(S.sec.talon?'open':'')+'">';
  if(tP)h+='<img src="'+tP.data+'" style="width:100%;border-radius:8px;border:1px solid var(--b);cursor:pointer" onclick="openLB(this.src)"/>';
  else h+='<div class="empty">—</div>';
  h+='</div></div>';

  // Documents
  h+='<div class="sec"><div class="sec-h" onclick="tS(\'docs\')"><div class="sec-t"><span class="step-n">2</span> '+T('docs')+'</div><span class="sec-badge '+(docs.length?'sb-ok':'sb-nd')+'">'+docs.length+'</span></div><div class="sec-bd '+(S.sec.docs?'open':'')+'">';
  if(docs.length){
    h+='<div class="doc-grid">';
    docs.forEach(function(d){h+='<div class="doc-card"><img src="'+d.data+'" onclick="openLB(this.src)" style="cursor:pointer"/><div class="doc-card-t">'+T(d.type)+'</div></div>'});
    h+='</div>';
  }else h+='<div class="empty">—</div>';
  h+='</div></div>';

  // Overview photos
  h+='<div class="sec"><div class="sec-h" onclick="tS(\'photos\')"><div class="sec-t"><span class="step-n">3</span> '+T('photos')+'</div><span class="sec-badge '+(ovP.length>=6?'sb-ok':ovP.length?'sb-pt':'sb-nd')+'">'+ovP.length+'/6</span></div><div class="sec-bd '+(S.sec.photos?'open':'')+'">';
  if(ovP.length){
    h+='<div class="pgrid">';
    ovP.forEach(function(p,idx){h+='<div class="pslot" style="cursor:pointer" onclick="openLB(this.querySelector(\'img\').src)"><img src="'+p.data+'"/><div class="pslot-label">'+T(VK[idx]||'')+'</div></div>'});
    h+='</div>';
  }else h+='<div class="empty">—</div>';
  h+='</div></div>';

  // Elements assessment
  h+='<div class="sec"><div class="sec-h" onclick="tS(\'elems\')"><div class="sec-t"><span class="step-n">4</span> '+T('elems')+' ('+elC+'/'+EK.length+')</div><span class="sec-badge '+(elC===EK.length?'sb-ok':elC?'sb-pt':'sb-nd')+'">'+dmgC+' '+T('dmg')+' · '+sugC+' '+T('sug')+' · '+okC+' '+T('ok')+'</span></div><div class="sec-bd '+(S.sec.elems?'open':'')+'">';
  if(elC){
    h+='<div class="el-list">';
    EK.forEach(function(k){
      var e=el[k];if(!e)return;
      var isOk=e.status==='ok',isDmg=e.status==='damaged',isSug=e.status==='suggested';
      var cls=isOk?'el-ok':isDmg?'el-dmg':isSug?'el-sug':'';
      var sCls=isOk?'es-ok':isDmg?'es-dmg':'es-sug';
      var tCls=isOk?'et-ok':isDmg?'et-dmg':'et-sug';
      var tLabel=isOk?T('ok'):isDmg?T('dmg'):T('sug');
      // Ops (checkbox) vagy regi work mez_ -> szoveges osszefoglalo
      var wk='';
      if(e.ops){
        var wkArr=[];
        if(e.ops.inlocuire)wkArr.push(T('replace'));
        if(e.ops.reparatie)wkArr.push(T('fix'));
        if(e.ops.vopsire)wkArr.push('Vopsire');
        if(e.ops.revopsire)wkArr.push('Revopsire');
        wk=wkArr.join(' + ');
      }else if(e.work){
        wk=T(e.work==='new'?'newP':e.work==='old'?'oldP':e.work==='replace'?'replace':e.work==='fix'?'fix':'uni');
      }
      h+='<div class="el '+cls+'"><div class="el-status '+sCls+'"></div><div class="el-detail"><div style="display:flex;align-items:center;gap:6px"><div class="el-name">'+T(k)+'</div><span class="el-tag '+tCls+'">'+tLabel+'</span>'+(wk?'<span class="el-work">'+wk+'</span>':'')+'</div>'+(e.note?'<div class="el-note">'+e.note+'</div>':'')+'</div>'+(e.photo?'<img class="el-photo" src="'+e.photo+'" onclick="openLB(this.src)"/>':'')+'</div>';
    });
    h+='</div>';
  }else h+='<div class="empty">—</div>';
  h+='</div></div>';

  h+='<div class="bpad"></div>';
  document.getElementById('app').innerHTML=h;
}

window.tS=function(s){S.sec[s]=S.sec[s]?0:1;render()};
window.openLB=function(src){var lb=document.createElement('div');lb.className='lightbox';lb.onclick=function(){lb.remove()};lb.innerHTML='<img src="'+src+'"/>';document.body.appendChild(lb)};
loadJob();
</script>
</body>
