function gJI(){return new URLSearchParams(location.search).get('job')}
async function loadJob(){
  var jid=gJI();if(!jid){render();return}

    if(!(JOB&&_lts&&_sts<=_lts)){JOB=res.data.data;if(!JOB.phases)JOB.phases={};for(var p=1;p<=7;p++){if(!JOB.phases[p])JOB.phases[p]={status:"pending"}};

var _saveTimer=null;
async function saveJ(){
  if(!JOB)return;
  try{localStorage.setItem('rpw_job_'+JOB.id,JSON.stringify(JOB));localStorage.setItem('rpw_job_ts_'+JOB.id,new Date().toISOString())}catch(e){}
  clearTimeout(_saveTimer);

    try{await sb.from('rpw_jobs').upsert({id:JOB.id,data:JOB,updated_at:new Date().toISOString()})}
    catch(e){console.error('Save:',e)}
  },500);
}

var DEF_HRS={replace:3,revopsire:3,uni:2,vopsire:3};
var EL_NAMES={fb:'Bara fata',rb:'Bara spate',hood:'Capota',trunk:'Portbagaj',roof:'Plafon',fl_f:'Aripa stg fata',fr_f:'Aripa dr fata',rl_f:'Aripa stg spate',rr_f:'Aripa dr spate',fl_d:'Usa stg fata',fr_d:'Usa dr fata',rl_d:'Usa stg spate',rr_d:'Usa dr spate',l_s:'Prag stg',r_s:'Prag dr',l_m:'Ogl. stg',r_m:'Ogl. dr',a_l:'Stalp A stg',a_r:'Stalp A dr',b_l:'Stalp B stg',b_r:'Stalp B dr',c_l:'Stalp C stg',c_r:'Stalp C dr'};

function buildPaintRows(){
  var rows=[],seen={};
  function add(key,r,src){
    if(seen[key])return;
    var pt=mapPaintType(r.op);
    if(!pt)return; // nem festode-munka (lakatos)
    seen[key]=1;
    var nm=r.name||EL_NAMES[r.elKey]||r.elKey||'';
    rows.push({key:key,name:nm,src:src,workType:r.op,paintType:pt,vopsire:true,hours:(r.hours!=null?r.hours:(DEF_HRS[pt]||3)),note:r.note||''});
  }
  var ed=JOB.evalData||{};
  var cR=ed.comanda||[];for(var x=0;x<cR.length;x++)add('c_'+(cR[x].id||x),cR[x],'evaluare');
  var sR=ed.suplimentare||[];for(var x=0;x<sR.length;x++)add('s_'+(sR[x].id||x),sR[x],'reconstatare');
  return rows;
}

function syncPaintRows(){
  if(!JOB)return;
  var gen=buildPaintRows(),old=JOB.paintRows||[],byKey={};
  old.forEach(function(r){byKey[r.key]=r});
  var merged=[];
  gen.forEach(function(g){var o=byKey[g.key];if(o){o.name=g.name;o.workType=g.workType;o.paintType=g.paintType;o.src=g.src;merged.push(o)}else merged.push(g)});
  old.forEach(function(r){if(r.src==='manual')merged.push(r)});
  JOB.paintRows=merged;
}

function mapPaintType(w){
  if(!w)return null;
  var wl=w.toLowerCase();
  if(wl==='vopsire')return 'vopsire';
  if(wl==='revopsire')return 'revopsire';
  if(wl==='uni'||wl.indexOf('uniform')>=0)return 'uni';
  return null; // inlocuire/demontat/dezasamblat/reparatie/mecanica = LAKATOS, NEM festode
}

var IC={back:'<svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>',print:'<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>',wa:'<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492l4.636-1.467A11.932 11.932 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818c-2.168 0-4.19-.592-5.935-1.62l-.424-.253-2.748.87.884-2.678-.278-.44A9.768 9.768 0 012.182 12c0-5.423 4.395-9.818 9.818-9.818S21.818 6.577 21.818 12 17.423 21.818 12 21.818z"/></svg>'};

function render(){
  var ln=gL(),job=JOB;
  if(!job){document.getElementById('app').innerHTML='<div class="loading">'+T('noJob')+'<br><br><button class="btn btn-o" style="width:auto;padding:10px 24px;display:inline-flex" onclick="location.assign(\'index.html\')">'+T('openD')+'</button></div>';return}

  syncPaintRows();

  function renderRow(r){
    var x=r._idx;
    var ptLabel=r.paintType==='vopsire'?T('vopsire_piese'):r.paintType==='replace'?T('inlocuit'):r.paintType==='revopsire'?T('revopsire'):r.paintType==='uni'?T('uniformizare'):T('extra');
    var ptClass=r.paintType==='vopsire'?'rt-vops':r.paintType==='replace'?'rt-inl':r.paintType==='revopsire'?'rt-rev':r.paintType==='uni'?'rt-uni':'rt-extra';
    var isReplace=r.paintType==='replace';
    var needsPaint=isReplace?(r.vopsire===true):(r.vopsire!==false);
    var hrsDisabled=!needsPaint;
    var typeTag=r.src==='manual'?'<select style="font-size:9px;font-weight:700;padding:3px 6px;border-radius:4px;border:1px solid var(--b);font-family:inherit" onchange="setPType('+x+',this.value)"><option value="replace" '+(r.paintType==='replace'?'selected':'')+'>'+T('inlocuit')+'</option><option value="revopsire" '+(r.paintType==='revopsire'?'selected':'')+'>'+T('revopsire')+'</option><option value="uni" '+(r.paintType==='uni'?'selected':'')+'>'+T('uniformizare')+'</option></select>':'<span class="row-type '+ptClass+'">'+ptLabel+'</span>';
    var o='<div class="row" style="'+(hrsDisabled?'opacity:.5':'')+'"><div class="row-top"><div class="row-name">'+(r.src==='manual'?'<input style="border:none;background:none;font-size:13px;font-weight:800;font-family:inherit;outline:none;width:100%" value="'+(r.name||'')+'" placeholder="Element..." onchange="setName('+x+',this.value)"/>':r.name||'—')+'</div>'+typeTag+'</div>';
    o+='<div class="row-detail">';
    if(isReplace){o+='<div class="vops-toggle"><div class="vt '+(r.vopsire===true?'on-da':'')+'" onclick="setVops('+x+',true)">'+T('da')+'</div><div class="vt '+(r.vopsire===false?'on-nu':'')+'" onclick="setVops('+x+',false)">'+T('nu')+'</div></div>'}
    else{o+='<div style="font-size:10px;font-weight:700;color:var(--g);padding:5px 0">'+T('vopsire')+' ✓</div>'}
    o+='<div class="hrs-box"><div class="hrs-label">'+T('ore')+'</div><input class="hrs-input mono '+(hrsDisabled?'disabled':'')+'" type="number" step="0.5" min="0" value="'+(needsPaint?r.hours:0)+'" onchange="setHrs('+x+',this.value)" '+(hrsDisabled?'disabled':'')+'></div>';
    o+='<div class="row-note"><input placeholder="'+T('obs')+'" value="'+(r.note||'')+'" onchange="setNote('+x+',this.value)"></div>';
    if(r.src==='manual'){o+='<button class="del-btn" onclick="delRow('+x+')">×</button>'}
    o+='</div></div>';
    return o;
  }

  // Split rows by source
  var rows=job.paintRows||[];
  var constRows=[],reconstRows=[],upsellRows=[],manualRows=[];
  rows.forEach(function(r,idx){r._idx=idx;if(r.src==='evaluare')constRows.push(r);else if(r.src==='reconstatare')reconstRows.push(r);else if(r.src==='aftersales')upsellRows.push(r);else manualRows.push(r)});
  var appr=job.paintApproval||{reconst:false,upsell:false};

  // Calc totals
  var totalHrs=0,paintCount=0;
  function countRow(r,approved){
    if(!approved&&r.src!=='evaluare'&&r.src!=='manual')return;
    var needsPaint=(r.paintType==='replace')?r.vopsire===true:(r.vopsire!==false);
    if(needsPaint){totalHrs+=parseFloat(r.hours)||0;paintCount++}
  }
  constRows.forEach(function(r){countRow(r,true)});
  reconstRows.forEach(function(r){countRow(r,appr.reconst)});
  upsellRows.forEach(function(r){countRow(r,appr.upsell)});
  manualRows.forEach(function(r){countRow(r,true)});

  var h='<div class="hdr"><div class="hdr-left"><div class="back" onclick="location.assign(\'rpw-dosar.html?job='+job.id+'\')">'+IC.back+'</div><div class="hdr-title"><span>Red</span> '+T('vopsitorie')+'</div></div><div class="hdr-right"><div class="hdr-job"><b class="mono">'+(job.number||job.id)+'</b><br><span style="color:var(--t3)">'+(job.plate||'')+' · '+(job.auto||'')+'</span></div><div class="lsw"><button class="lb '+(ln==='ro'?'on':'')+'" onclick="sL(\'ro\')">RO</button><button class="lb '+(ln==='en'?'on':'')+'" onclick="sL(\'en\')">EN</button><button class="lb '+(ln==='hu'?'on':'')+'" onclick="sL(\'hu\')">HU</button></div></div></div>';

  h+='<div class="company">SC SZKALICZKI SERVICE SRL · RO16250445 · Str. Petki David, Nr.27/A, Sangeorgiu de Mures · Tel: 0265318020</div>';

  // Vehicle
  h+='<div class="sec"><div class="sec-h"><div class="sec-t">'+T('vehicul')+'</div></div><div class="sec-bd"><div class="info-grid"><div class="info-f"><div class="info-l">'+T('plate')+'</div><div class="info-v mono" style="font-size:16px;font-weight:800">'+(job.plate||'—')+'</div></div><div class="info-f"><div class="info-l">'+T('proprietar')+'</div><div class="info-v">'+(job.proprietar||job.client||'—')+'</div></div></div><div class="info-grid" style="margin-top:6px"><div class="info-f"><div class="info-l">'+T('brand')+'</div><div class="info-v">'+(job.brand||job.auto||'—')+'</div></div><div class="info-f"><div class="info-l">'+T('year')+'</div><div class="info-v mono">'+(job.year||'—')+'</div></div></div></div></div>';

  // Summary bar
  h+='<div class="summary"><div class="sum-item"><div class="sum-val">'+paintCount+'</div><div class="sum-label">'+T('elemVops')+'</div></div><div class="sum-item"><div class="sum-val">'+totalHrs.toFixed(1)+'</div><div class="sum-label">'+T('totalOre')+'</div></div></div>';

  // === SECTOR 1: CONSTATARE — always green ===
  var cHrs=0;constRows.forEach(function(r){var np=(r.paintType==='replace')?r.vopsire===true:true;if(np)cHrs+=parseFloat(r.hours)||0});
  h+='<div class="sector" style="border-color:var(--g)"><div class="sector-hdr sector-hdr-green"><div class="sector-hdr-title"><div class="sector-dot dot-on"></div>'+T('secConst')+'</div><div class="sector-hdr-badge">'+cHrs.toFixed(1)+' <span>'+T('ore')+'</span></div></div><div class="sector-bd">';
  if(constRows.length){for(var x=0;x<constRows.length;x++)h+=renderRow(constRows[x])}
  else h+='<div class="sector-empty">—</div>';
  h+='</div></div>';

  // === SECTOR 2: RECONSTATARE — red/green ===
  var rHrs=0;if(appr.reconst)reconstRows.forEach(function(r){var np=(r.paintType==='replace')?r.vopsire===true:true;if(np)rHrs+=parseFloat(r.hours)||0});
  h+='<div class="sector" style="border-color:'+(appr.reconst?'var(--g)':'var(--r)')+'"><div class="sector-hdr '+(appr.reconst?'sector-hdr-green':'sector-hdr-red')+'" onclick="toggleAppr(\'reconst\')"><div class="sector-hdr-title"><div class="sector-dot '+(appr.reconst?'dot-on':'dot-off')+'"></div>'+T('secReconst')+'</div><div style="display:flex;align-items:center;gap:10px"><div class="sector-hdr-badge">'+(appr.reconst?rHrs.toFixed(1):'—')+' <span>'+T('ore')+'</span></div><div style="font-size:10px;font-weight:800;color:#fff;padding:4px 10px;border-radius:4px;background:rgba(255,255,255,.2)">'+(appr.reconst?'✓ '+T('aprobat'):'✗ '+T('neaprobat'))+'</div></div></div><div class="sector-bd" style="'+(appr.reconst?'':'opacity:.4;pointer-events:none')+'">';
  if(reconstRows.length){for(var x=0;x<reconstRows.length;x++)h+=renderRow(reconstRows[x])}
  else h+='<div class="sector-empty">—</div>';
  h+='</div></div>';

  // === SECTOR 3: UPSELL — red/green ===
  var uHrs=0;if(appr.upsell)upsellRows.forEach(function(r){var np=(r.paintType==='replace')?r.vopsire===true:true;if(np)uHrs+=parseFloat(r.hours)||0});
  h+='<div class="sector" style="border-color:'+(appr.upsell?'var(--g)':'var(--r)')+'"><div class="sector-hdr '+(appr.upsell?'sector-hdr-green':'sector-hdr-red')+'" onclick="toggleAppr(\'upsell\')"><div class="sector-hdr-title"><div class="sector-dot '+(appr.upsell?'dot-on':'dot-off')+'"></div>'+T('secUpsell')+'</div><div style="display:flex;align-items:center;gap:10px"><div class="sector-hdr-badge">'+(appr.upsell?uHrs.toFixed(1):'—')+' <span>'+T('ore')+'</span></div><div style="font-size:10px;font-weight:800;color:#fff;padding:4px 10px;border-radius:4px;background:rgba(255,255,255,.2)">'+(appr.upsell?'✓ '+T('aprobat'):'✗ '+T('neaprobat'))+'</div></div></div><div class="sector-bd" style="'+(appr.upsell?'':'opacity:.4;pointer-events:none')+'">';
  if(upsellRows.length){for(var x=0;x<upsellRows.length;x++)h+=renderRow(upsellRows[x])}
  else h+='<div class="sector-empty">—</div>';
  h+='</div></div>';

  // Manual additions
  if(manualRows.length){
    h+='<div class="sec" style="margin-top:12px"><div class="sec-h"><div class="sec-t">'+T('extra')+'</div></div><div class="sec-bd">';
    for(var x=0;x<manualRows.length;x++)h+=renderRow(manualRows[x]);
    h+='</div></div>';
  }
  h+='<div style="padding:8px 16px 0"><div class="add-row" onclick="addRow()">'+T('addRow')+'</div></div>';

  // Actions
  h+='<div class="action-grid"><button class="btn btn-wa" onclick="waPaint()">'+IC.wa+' '+T('waBtn')+'</button><button class="btn btn-o" onclick="window.print()">'+IC.print+' '+T('print')+'</button></div>';
  h+='<div style="padding:0 16px 10px"><button class="btn btn-g" onclick="advPh()">'+T('advance')+'</button></div>';

  h+='<div class="bpad"></div>';
  if(S.ts)h+='<div class="toast '+(S.te?'err':'')+'">'+S.ts+'</div>';
  document.getElementById('app').innerHTML=h;
}

window.toggleAppr=async function(key){
  if(!JOB)return;
  if(!JOB.paintApproval)JOB.paintApproval={reconst:false,upsell:false};
  JOB.paintApproval[key]=!JOB.paintApproval[key];
  await saveJ();render();
};
window.setVops=async function(idx,val){
  if(!JOB||!JOB.paintRows)return;
  JOB.paintRows[idx].vopsire=val;
  if(!val)JOB.paintRows[idx].hours=0;
  else JOB.paintRows[idx].hours=DEF_HRS[JOB.paintRows[idx].paintType]||3;
  await saveJ();render();
};
window.setHrs=async function(idx,val){
  if(!JOB||!JOB.paintRows)return;
  JOB.paintRows[idx].hours=parseFloat(val)||0;
  await saveJ();render();
};
window.setNote=async function(idx,val){
  if(!JOB||!JOB.paintRows)return;
  JOB.paintRows[idx].note=val;
  await saveJ();
};
window.setName=async function(idx,val){
  if(!JOB||!JOB.paintRows)return;
  JOB.paintRows[idx].name=val;
  await saveJ();
};
window.setPType=async function(idx,val){
  if(!JOB||!JOB.paintRows)return;
  JOB.paintRows[idx].paintType=val;
  JOB.paintRows[idx].vopsire=val==='replace'?null:true;
  JOB.paintRows[idx].hours=DEF_HRS[val]||3;
  await saveJ();render();
};
window.addRow=async function(){
  if(!JOB)return;
  if(!JOB.paintRows)JOB.paintRows=[];
  JOB.paintRows.push({key:'paint_'+Date.now(),name:'',src:'manual',workType:'',paintType:'fix',vopsire:true,hours:3,note:''});
  await saveJ();render();
};
window.delRow=async function(idx){
  if(!JOB||!JOB.paintRows)return;
  JOB.paintRows.splice(idx,1);
  await saveJ();render();
};

window.waPaint=function(){
  if(!JOB)return;
  var rows=JOB.paintRows||[],appr=JOB.paintApproval||{};
  var phone=(JOB.phone||'').replace(/[^0-9+]/g,'');
  if(!phone||phone.length<6){phone=prompt('Numar telefon:','');if(!phone)return}
  phone=phone.replace(/[^0-9]/g,'');
  if(phone.length&&phone[0]==='0')phone='40'+phone.slice(1);

  var msg='*RedAssistance — Comanda Vopsitorie*\n\n';
  msg+='🚗 '+(JOB.brand||JOB.auto||'')+' · '+(JOB.plate||'')+'\n';
  msg+='Client: '+(JOB.proprietar||JOB.client||'')+'\n';
  msg+='Nr: '+(JOB.number||JOB.id)+'\n';

  var totalHrs=0,cnt=0;
  function addSection(title,srcRows,approved){
    if(!srcRows.length)return;
    msg+='\n*'+title+'* '+(approved?'✅':'❌')+'\n';
    for(var x=0;x<srcRows.length;x++){
      var r=srcRows[x];
      var needsPaint=(r.paintType==='replace')?r.vopsire===true:true;
      if(!needsPaint){msg+='  '+(x+1)+'. '+r.name+' [INLOCUIT — fara vopsire]\n';continue}
      if(!approved)continue;
      cnt++;var h=parseFloat(r.hours)||0;totalHrs+=h;
      var typeL=r.paintType==='replace'?'INLOCUIT':r.paintType==='uni'?'UNIFORM.':'REVOPSIRE';
      msg+='  '+cnt+'. *'+r.name+'* ['+typeL+'] — '+h+' ore'+(r.note?' ('+r.note+')':'')+'\n';
    }
  }
  var constR=[],reconstR=[],upsellR=[];
  rows.forEach(function(r){if(r.src==='evaluare')constR.push(r);else if(r.src==='reconstatare')reconstR.push(r);else if(r.src==='aftersales')upsellR.push(r);else{constR.push(r)}});
  addSection('CONSTATARE',constR,true);
  addSection('RECONSTATARE',reconstR,!!appr.reconst);
  addSection('UPSELL',upsellR,!!appr.upsell);

  msg+='\n*TOTAL: '+totalHrs.toFixed(1)+' ore vopsire ('+cnt+' elemente)*\n\n';
  msg+='📞 0265318020\n📍 SC SZKALICZKI SERVICE SRL';

  var _waA=document.createElement('a');_waA.href='https://wa.me/'+phone+'?text='+encodeURIComponent(msg);_waA.target='_blank';_waA.rel='noopener';document.body.appendChild(_waA);_waA.click();setTimeout(function(){document.body.removeChild(_waA)},100);
};

window.advPh=async function(){
  if(!JOB)return;
  JOB.phases[5].status='done';JOB.phases[5].finished=new Date().toISOString();
  if(JOB.phase<=5){JOB.phase=6;JOB.phases[6].status='active';JOB.phases[6].started=new Date().toISOString()}
  await saveJ();toast(T('saved'));
  setTimeout(function(){location.assign('rpw-dosar.html?job='+JOB.id)},1500);
};

loadJob();
</script>
</body>
