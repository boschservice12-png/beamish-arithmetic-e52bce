<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f3;--w:#fff;--r:#dc2626;--r50:#fef2f2;--r100:#fee2e2;--r700:#b91c1c;--g:#16a34a;--gl:#dcfce7;--y:#ca8a04;--yl:#fef9c3;--bl:#2563eb;--bll:#dbeafe;--p:#7c3aed;--pl:#ede9fe;--or:#ea580c;--orl:#fff7ed;--tl:#0d9488;--tll:#ccfbf1;--t:#1a1a1a;--t2:#555;--t3:#999;--b:#e5e5e5;--b2:#d0d0d0;--rd:10px}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.hdr{background:var(--w);border-bottom:1px solid var(--b);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-left{display:flex;align-items:center;gap:8px}
.back{width:32px;height:32px;border-radius:8px;border:1px solid var(--b);background:var(--w);display:flex;align-items:center;justify-content:center;cursor:pointer}
.back svg{width:18px;height:18px;stroke:var(--t2);fill:none;stroke-width:2}
.hdr-title{font-size:14px;font-weight:800}.hdr-title span{color:var(--r)}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-job{text-align:right;font-size:11px;line-height:1.3}.hdr-job b{font-size:12px}
.lsw{display:flex;border:1px solid var(--b);border-radius:6px;overflow:hidden}
.lb{padding:4px 8px;font-size:9px;font-weight:700;cursor:pointer;border:none;background:var(--w);color:var(--t3);font-family:inherit}.lb.on{background:var(--r);color:#fff}.lb:not(:last-child){border-right:1px solid var(--b)}
.btn{border:none;border-radius:var(--rd);padding:10px 16px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;width:100%}
.btn-r{background:var(--r);color:#fff}.btn-g{background:var(--g);color:#fff}.btn-o{background:var(--w);color:var(--t2);border:1px solid var(--b2)}
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px}
.type-card{background:var(--w);border:2px solid var(--b);border-radius:var(--rd);padding:20px 14px;text-align:center;cursor:pointer}
.type-card.on-a{border-color:var(--bl);background:var(--bll)}.type-card.on-b{border-color:var(--or);background:var(--orl)}
.tc-icon{font-size:24px;margin-bottom:6px;display:flex;justify-content:center}.tc-icon svg{width:32px;height:32px}.tc-t{font-size:13px;font-weight:800}.tc-s{font-size:10px;color:var(--t3);margin-top:2px}
.sec{margin:8px 16px 0;background:var(--w);border:1px solid var(--b);border-radius:var(--rd);overflow:hidden}
.sec-h{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}.sec-h:active{background:var(--bg)}
.sec-t{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.sec-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px}
.sb-ok{background:var(--gl);color:var(--g)}.sb-nd{background:var(--r100);color:var(--r)}.sb-pt{background:var(--yl);color:var(--y)}
.sec-bd{padding:0 14px 14px;display:none}.sec-bd.open{display:block}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--r);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-f{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:8px 10px}
.info-f.warn{background:var(--yl);border-color:var(--y)}
.info-l{font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:2px}
.info-v{width:100%;border:none;background:none;font-size:13px;font-weight:700;color:var(--t);font-family:inherit;outline:none}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pslot{background:var(--bg);border:2px dashed var(--b2);border-radius:8px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden}
.pslot.done{border:2px solid var(--g);background:var(--gl)}
.pslot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.pslot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;font-size:0}
.pslot-icon{width:28px;height:28px;stroke:var(--t3);fill:none;stroke-width:1.5}
.pslot-label{font-size:10px;font-weight:600;color:var(--t3);margin-top:4px}
.pslot-chk{position:absolute;top:6px;right:6px;width:22px;height:22px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:1}
.pslot-chk svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5}
.talon-box{background:var(--bg);border:2px dashed var(--b2);border-radius:var(--rd);padding:24px;text-align:center;cursor:pointer;position:relative;overflow:hidden}
.talon-box.done{border:2px solid var(--g);background:var(--gl)}
.talon-box img{width:100%;border-radius:8px;margin-bottom:8px}
.talon-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;font-size:0}
.tb-icon{width:36px;height:36px;stroke:var(--t3);fill:none;stroke-width:1.5;margin:0 auto 6px;display:block}
.tb-t{font-size:14px;font-weight:700;color:var(--t2)}.tb-s{font-size:10px;color:var(--t3);margin-top:3px}
.reocr-btn{margin-top:8px;display:inline-flex;align-items:center;gap:4px;background:var(--bll);color:var(--bl);border:1px solid var(--bl);border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit}
.ocr-bar{margin-top:10px;height:4px;background:var(--b);border-radius:2px;overflow:hidden}
.ocr-fill{height:100%;background:var(--bl);border-radius:2px;transition:width .3s}
.ocr-text{font-size:11px;color:var(--bl);font-weight:600;margin-top:6px}
.doc-list{display:flex;flex-direction:column;gap:6px}
.doc-item{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
.doc-item.done{background:var(--gl);border-color:var(--g)}
.doc-item .doc-upload{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;font-size:0}
.di-icon{width:28px;height:28px;border-radius:6px;background:var(--w);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.di-icon svg{width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:1.5}.doc-item.done .di-icon svg{stroke:var(--g)}
.di-text{flex:1;min-width:0}.di-name{font-size:12px;font-weight:700}.di-req{font-size:9px;font-weight:600;margin-top:1px}.di-req.req{color:var(--r)}.di-req.opt{color:var(--t3)}
.di-chk{width:22px;height:22px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;flex-shrink:0}.di-chk svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5}
.di-thumb{width:40px;height:30px;object-fit:cover;border-radius:4px;border:1px solid var(--b);flex-shrink:0}
.add-doc-btn{margin-top:6px;padding:10px;border:2px dashed var(--b2);border-radius:8px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--t2);background:var(--w)}
.add-doc-btn:hover{background:var(--r50);border-color:var(--r);color:var(--r)}
.del-cd-btn{width:22px;height:22px;border-radius:50%;border:none;background:var(--r100);color:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;position:relative;z-index:3}
.del-cd-btn:hover{background:var(--r);color:#fff}
.el{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.el.el-ok{border-color:var(--g);background:var(--gl)}.el.el-dmg{border-color:var(--r);background:var(--r50)}.el.el-sug{border-color:var(--or);background:var(--orl)}
.el.el-missing-photo{border-color:var(--y);background:var(--yl)}
.el-top{display:flex;justify-content:space-between;align-items:center;gap:4px}.el-n{font-size:12px;font-weight:700;flex:1;min-width:0}
.el-btns{display:flex;gap:3px;flex-shrink:0}
.eb{padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid var(--b);background:var(--w);font-family:inherit}
.eb-ok.on{background:var(--gl);border-color:var(--g);color:var(--g)}
.eb-dm.on{background:var(--r100);border-color:var(--r);color:var(--r)}
.eb-sg{background:var(--w);color:var(--or);border-color:var(--or)}
.eb-sg.on{background:var(--orl);border-color:var(--or);color:var(--or)}
.el-det{margin-top:6px;display:flex;gap:6px;align-items:flex-start;flex-wrap:wrap}
.el-ph-row{display:flex;gap:4px;flex-wrap:wrap}
.el-ph{width:50px;height:38px;background:var(--w);border:1.5px dashed var(--b2);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;flex-shrink:0}
.el-ph.done{border:1.5px solid var(--g)}.el-ph img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.el-ph input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.el-ph svg{width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:1.5}
.el-ph-del{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--r);color:#fff;border-radius:50%;font-size:10px;line-height:16px;cursor:pointer;z-index:3;border:none;font-family:inherit;padding:0}
.el-nt{flex:1;min-width:100px;font-size:11px;background:var(--w);border:1px solid var(--b);border-radius:6px;padding:6px 8px;font-family:inherit;outline:none;resize:none;min-height:30px;color:var(--t)}.el-nt:focus{border-color:var(--r)}
.el-wt{margin-top:6px;display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.wt{padding:3px 7px;border-radius:4px;font-size:9px;font-weight:700;cursor:pointer;border:1.5px solid var(--b);background:var(--w);font-family:inherit}
.wt-inl.on{background:var(--r100);border-color:var(--r);color:var(--r)}
.wt-rep.on{background:var(--yl);border-color:var(--y);color:var(--y)}
.wt-vop.on{background:var(--pl);border-color:var(--p);color:var(--p)}
.wt-rvp.on{background:var(--tll);border-color:var(--tl);color:var(--tl)}
.wt-ora{display:inline-flex;align-items:center;gap:4px;background:var(--yl);border:1.5px solid var(--y);border-radius:4px;padding:2px 6px;margin-left:4px}
.wt-ora input{width:44px;border:none;background:transparent;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--y);outline:none;text-align:center}
.wt-ora-lbl{font-size:9px;font-weight:700;color:var(--y)}
.alt-add{background:var(--bg);border:1.5px dashed var(--b2);border-radius:8px;padding:10px;display:flex;gap:6px;align-items:center;margin-top:8px}
.alt-add input{flex:1;border:1px solid var(--b);border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;outline:none;background:var(--w)}
.alt-add button{padding:6px 12px;background:var(--r);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.alt-src{font-size:8px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.alt-src.ocr{color:var(--bl)}
.cl{margin:8px 16px 0;background:var(--w);border:1px solid var(--b);border-radius:var(--rd);padding:14px}
.cl-t{font-size:10px;font-weight:700;color:var(--r);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.cl-i{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.cl-ic{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cl-ic.ok{background:var(--g)}.cl-ic.no{background:var(--r100)}
.cl-ic svg{width:10px;height:10px;fill:none;stroke-width:3}.cl-ic.ok svg{stroke:#fff}.cl-ic.no svg{stroke:var(--r)}
.cl-tx{flex:1}.cl-tx.ok{color:var(--g)}.cl-tx.no{color:var(--r);font-weight:600}
.toast{position:fixed;bottom:20px;left:16px;right:16px;background:var(--w);padding:11px 14px;border-radius:var(--rd);font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.12);border-left:4px solid var(--g);z-index:250}.toast.err{border-left-color:var(--r)}.toast.info{border-left-color:var(--bl)}
.bpad{height:24px}.hint{font-size:10px;color:var(--t3);text-align:center;margin-top:6px}
.loading{text-align:center;padding:60px;color:var(--t3);font-size:14px}
.mismatch-warn{background:var(--yl);border:1px solid var(--y);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--y);font-weight:700;margin-top:6px}
.raw-box{background:var(--w);border:1px solid var(--b);border-radius:6px;padding:8px;font-size:10px;color:var(--t2);margin-top:8px;max-height:100px;overflow-y:auto;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;word-break:break-word}
.as-empty{text-align:center;padding:20px;color:var(--t3);font-size:11px}
.uploading{opacity:0.6;pointer-events:none}
.thumb-loading{display:inline-block;width:40px;height:30px;background:var(--b);border-radius:4px;position:relative;overflow:hidden}
.thumb-loading::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
</style>

<script>
/* =============================================================
   RedAssistance — Receptie (v2.1)
   Regi vaz + uj retegek + Claude OCR + Supabase Storage

   UJITASOK:
   - Claude Sonnet 4.5 OCR via /.netlify/functions/ocr
   - Fotok: Supabase Storage (URL-ek a JOB-ban, nem base64)
   - Uj szekcio: Constatare OCR (csak ASIG)
   - Uj mezok: capacitate, nrDosar, proprietarDosar, asigurator, listaDauneRaw
   - Uj szekcio: Alte piese (non-caroserie) - JOB.alteParti[]
   - Uj szekcio: Aftersales panel (recomandate)
   - Uj work tipus: revopsire
   - oraNormata csak reparatie mellett
   - Foto kotelezoseg avariat/recomandat elemekre
   - Tipusvaltas vedelem

   KOMPATIBILITAS:
   - status: irjuk a regi ('damaged'/'suggested'/'ok') ES uj ('avariata'/'recomandata'/'ok') mezoket
   - work: irjuk a regi ('replace'/'fix'/'uni') ES uj ('inlocuire'/'reparatie'/'vopsire'/'revopsire') mezoket
   - JOB.photoKeys megmarad a regi kompatibilitashoz
   ============================================================= */

// ────── SUPABASE ──────────────────────────────────────────────
var SB_URL=RPW_CFG.SB_URL;
var SB_KEY=RPW_CFG.SB_KEY;
var sb=supabase.createClient(SB_URL,SB_KEY);
var STORAGE_BUCKET=RPW_CFG.BUCKET;

// ────── STATE ─────────────────────────────────────────────────
var JOB=null;
var S={
  sec:{talon:1,constatare:0,docs:0,photos:0,elems:0,alteParti:0,afterSales:0},
  ts:null,te:0,
  ocrProg:{talon:0,constatare:0,buletin:0},
  ocrRun:{talon:false,constatare:false,buletin:false},
  uploading:{},        // kulcs: fotoKulcs, ertek: folyamatban
  photoCache:{},       // fotoKulcs -> url (ha mar letoltve)
  newAltName:''
};

// ────── KONSTANSOK ────────────────────────────────────────────

// 23 karosszeria elem kulcsa (regi kompatibilis)
var EK=['fb','rb','hood','trunk','roof','fl_f','fr_f','rl_f','rr_f','fl_d','fr_d','rl_d','rr_d','l_s','r_s','l_m','r_m','a_l','a_r','b_l','b_r','c_l','c_r'];
// Paintable elemek (van festheto felulet): alapertelmezes true. Csak a NEM festhetokre irunk false-t.
var PAINTABLE={l_m:false,r_m:false};  // oglinzi: fara fenyezes

// Kulcsszavak a 23 karosszeria elem automatikus jelolesehez (RO)
var PARTS_KEYWORDS={
  fb:['bara fata','bara față','bară fata','bară față','tampon fata','tampon față','bumper fata'],
  rb:['bara spate','bară spate','tampon spate','bumper spate'],
  hood:['capota','capotă','capota fata','capota motor','capotă motor'],
  trunk:['portbagaj','capota portbagaj','capota spate','capotă spate','capotă portbagaj'],
  roof:['plafon','acoperis','acoperiș'],
  fl_f:['aripa stanga fata','aripă stânga față','aripa stg fata','aripă stg față'],
  fr_f:['aripa dreapta fata','aripă dreapta față','aripa dr fata','aripă dr față'],
  rl_f:['aripa stanga spate','aripă stânga spate','aripa stg spate'],
  rr_f:['aripa dreapta spate','aripă dreapta spate','aripa dr spate'],
  fl_d:['usa stanga fata','ușă stânga față','usa stg fata','portiera stanga fata','portieră stânga față'],
  fr_d:['usa dreapta fata','ușă dreapta față','usa dr fata','portiera dreapta fata','portieră dreapta față'],
  rl_d:['usa stanga spate','ușă stânga spate','usa stg spate','portiera stanga spate'],
  rr_d:['usa dreapta spate','ușă dreapta spate','usa dr spate','portiera dreapta spate'],
  l_s:['prag stanga','prag stânga','prag stg'],
  r_s:['prag dreapta','prag dr'],
  l_m:['oglinda stanga','oglindă stânga','oglinda stg'],
  r_m:['oglinda dreapta','oglindă dreapta','oglinda dr'],
  a_l:['stalp a stanga','stâlp a stânga','stalp a stg','montant a stg'],
  a_r:['stalp a dreapta','stâlp a dreapta','stalp a dr','montant a dr'],
  b_l:['stalp b stanga','stâlp b stânga','stalp b stg','montant b stg'],
  b_r:['stalp b dreapta','stâlp b dreapta','stalp b dr','montant b dr'],
  c_l:['stalp c stanga','stâlp c stânga','stalp c stg','montant c stg'],
  c_r:['stalp c dreapta','stâlp c dreapta','stalp c dr','montant c dr']
};

// Work type konverzio (uj -> regi) - hogy a 2-es fazis is olvasni tudja
var WORK_V2_TO_V1={
  inlocuire:'replace',
  reparatie:'fix',
  vopsire:'uni',
  revopsire:'uni'
};

// Status konverzio (uj -> regi)
var STATUS_V2_TO_V1={
  ok:'ok',
  avariata:'damaged',
  recomandata:'suggested'
};

// Photo slot kulcsok
var VK=['front','back','left','right','serieCaros','km'];

// Documente per tip dauna
var DA=[{id:'constAmiabila',req:0},{id:'permisFata',req:0},{id:'permisVerso',req:0}];
var DB=[];

// ────── i18n ──────────────────────────────────────────────────
var i={
  reception:{ro:'Receptie',en:'Reception',hu:'Recepcio'},
  selType:{ro:'Selecteaza tipul',en:'Select type',hu:'Valassz tipust'},
  asig:{ro:'Dauna asigurare',en:'Insurance',hu:'Biztositos'},
  asigS:{ro:'RCA / CASCO',en:'RCA / CASCO',hu:'RCA / CASCO'},
  autoD:{ro:'Dauna auto',en:'Self-paid',hu:'Magankar'},
  autoS:{ro:'Client particular',en:'Private',hu:'Magan'},
  clientInfo:{ro:'Date client',en:'Client info',hu:'Ugyfel'},
  wsNum:{ro:'Nr. fisa',en:'Worksheet',hu:'Munkalap'},
  clientN:{ro:'Nume',en:'Name',hu:'Nev'},
  clientP:{ro:'Telefon',en:'Phone',hu:'Tel'},

// ────── LEGACY MIGRATION ─────────────────────────────────────
/* Regi dossziek akik meg damaged/suggested-et hasznalnak */
function migrateLegacy(job){
  if(!job || !job.elements)return;
  for(var k in job.elements){
    var e=job.elements[k];
    if(!e)continue;
    // Status: regi -> uj parallel (mindket irodik)
    if(e.status==='damaged' && !e.statusV2) e.statusV2='avariata';
    else if(e.status==='suggested' && !e.statusV2) e.statusV2='recomandata';
    else if(e.status==='ok' && !e.statusV2) e.statusV2='ok';
    // Work: regi -> uj parallel
    if(e.work==='replace' && !e.workV2) e.workV2='inlocuire';
    else if(e.work==='fix' && !e.workV2) e.workV2='reparatie';
    else if(e.work==='uni' && !e.workV2) e.workV2='vopsire';
    // Photos - tomb hogy tobb is legyen
    if(!e.photos)e.photos=[];
  }
  if(!job.alteParti)job.alteParti=[];
}

// ────── LOAD / SAVE ──────────────────────────────────────────
async function loadJob(){
  var jid=gJI();
  if(!jid){render();return}
  var cached=localStorage.getItem('rpw_job_'+jid);
  if(cached){
    try{
      JOB=JSON.parse(cached);
      fixPhases();migrateLegacy(JOB);
      render();
    }catch(e){}
  }
  try{
    var res=await sb.from('rpw_jobs').select('id,data,updated_at').eq('id',jid).single();
    if(res.error)throw res.error;
    var lts=null;try{lts=localStorage.getItem('rpw_job_ts_'+jid)}catch(e){}
    var sNew=Date.parse(res.data.updated_at||0)||0, lNew=Date.parse(lts||0)||0;
    if(!JOB||!lts||sNew>lNew){
      JOB=res.data.data;
      fixPhases();migrateLegacy(JOB);
      try{localStorage.setItem('rpw_job_'+JOB.id,JSON.stringify(JOB));localStorage.setItem('rpw_job_ts_'+JOB.id,res.data.updated_at||new Date().toISOString())}catch(e){}
    }
    /* nincs auto-mentes betolteskor */
  }catch(e){if(!JOB)JOB=null}
  render();
}

function fixPhases(){
  if(!JOB)return;
  if(!JOB.phases)JOB.phases={};
  for(var p=1;p<=7;p++){if(!JOB.phases[p])JOB.phases[p]={status:'pending'}}
  if(!JOB.photoKeys)JOB.photoKeys={};
  if(!JOB.photoUrls)JOB.photoUrls={};
  if(!JOB.elements)JOB.elements={};
  if(!JOB.alteParti)JOB.alteParti=[];
}

var _saveTimer=null;
async function saveJ(){
  if(!JOB)return;
  try{localStorage.setItem('rpw_job_'+JOB.id,JSON.stringify(JOB));localStorage.setItem('rpw_job_ts_'+JOB.id,new Date().toISOString())}catch(e){}
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async function(){
    try{
      var p=sb.from('rpw_jobs').upsert({id:JOB.id,data:JOB,updated_at:new Date().toISOString()});
      var t=new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'))},4000)});
      Promise.race([p,t]).catch(function(e){console.warn('SB offline:',e.message)});
    }catch(e){console.error('Save:',e)}
  },600);
}

/* Kepmeret csokkentes feltoltes elott */
function resizeFile(file){
  return new Promise(function(res){
    var r=new FileReader();
    r.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas'),mx=1600,sc=img.width>mx?mx/img.width:1;
        c.width=img.width*sc;c.height=img.height*sc;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',.85));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

// ────── SUPABASE STORAGE HELPERS ─────────────────────────────
/* Fotofeltoltes Supabase Storage-ba. Visszaadja a public URL-t. */
async function uploadPhoto(photoKey,dataUrl){
  if(!JOB||!JOB.id)throw new Error('no job');
  S.uploading[photoKey]=true;render();
  try{
    // dataUrl -> blob
    var res=await fetch(dataUrl);
    var blob=await res.blob();
    var path=JOB.id+'/'+photoKey+'.jpg';
    // Upsert (lecsereli ha mar letezik)
    var up=await sb.storage.from(STORAGE_BUCKET).upload(path,blob,{contentType:'image/jpeg',upsert:true});
    if(up.error)throw up.error;
    // Public URL
    var urlData=sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
    var url=urlData.data.publicUrl;
    // Update JOB
    if(!JOB.photoKeys)JOB.photoKeys={};
    if(!JOB.photoUrls)JOB.photoUrls={};
    JOB.photoKeys[photoKey]=true;
    JOB.photoUrls[photoKey]=url;
    S.photoCache[photoKey]=url;
    await saveJ();
    return url;
  }finally{
    delete S.uploading[photoKey];
    render();
  }
}

/* Foto torles a Storage-bol */
async function deletePhoto(photoKey){
  if(!JOB||!JOB.id)return;
  var path=JOB.id+'/'+photoKey+'.jpg';
  try{await sb.storage.from(STORAGE_BUCKET).remove([path])}catch(e){console.warn('Delete:',e)}
  if(JOB.photoKeys)delete JOB.photoKeys[photoKey];
  if(JOB.photoUrls)delete JOB.photoUrls[photoKey];
  delete S.photoCache[photoKey];
  await saveJ();
}

/* URL kinyerese egy fotokulcshoz */
function photoUrl(photoKey){
  if(S.photoCache[photoKey])return S.photoCache[photoKey];
  if(JOB&&JOB.photoUrls&&JOB.photoUrls[photoKey]){
    S.photoCache[photoKey]=JOB.photoUrls[photoKey];
    return JOB.photoUrls[photoKey];
  }
  return null;
}

/* DataURL -> nyers base64 (OCR-hez) */
function dataUrlToBase64(dataUrl){
  return dataUrl.split(',')[1];
}

// ────── CLAUDE OCR VIA NETLIFY FUNCTION ──────────────────────
async function callOCR(base64Raw,type){
  var resp=await fetch('/.netlify/functions/ocr',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({image:base64Raw,type:type})
  });
  var data=await resp.json();
  if(!resp.ok)throw new Error(data.error||'OCR failed (HTTP '+resp.status+')');
  try{
    return JSON.parse(data.result);
  }catch(e){
    console.warn('OCR returned non-JSON:',data.result);
    throw new Error('OCR result not JSON');
  }
}

/* Talon OCR - megőrzi a régi viselkedést + kiegészíti capacitate-vel */
async function ocrTalon(dataUrl){
  S.ocrRun.talon=true;render();
  try{
    var p=await callOCR(dataUrlToBase64(dataUrl),'talon');
    // Csak akkor ir felul, ha a mezo uresen vagy user nem modositotta
    if(p.plate&&p.plate!=='null'&&!JOB._plateEdited)JOB.plate=String(p.plate).toUpperCase();
    if(p.vin&&p.vin!=='null'&&!JOB._vinEdited)JOB.vin=String(p.vin).toUpperCase();
    if(p.brand&&p.brand!=='null'&&!JOB._brandEdited){
      JOB.brand=p.brand;
      JOB.auto=p.brand+(p.model&&p.model!=='null'?' '+p.model:'');
    }
    if(p.year&&p.year!=='null'&&!JOB._yearEdited)JOB.year=String(p.year);
    if(p.capacitate&&p.capacitate!=='null'&&!JOB._capEdited)JOB.capacitate=String(p.capacitate);
    if(p.owner&&p.owner!=='null'&&!JOB._propEdited)JOB.proprietar=p.owner;
    if(!JOB.ocrTs)JOB.ocrTs={};
    JOB.ocrTs.talon=new Date().toISOString();
    await saveJ();
    S.ocrRun.talon=false;
    toast('Talon: '+(p.plate||'?')+' / '+(p.vin?'VIN OK':'?')+' / '+(p.brand||'?'),'info');
    render();
  }catch(e){
    S.ocrRun.talon=false;
    toast('Talon OCR: '+e.message,'err');
    render();
  }
}

/* Constatare OCR - kulcs funkcio.
   Kinyeri: nrDosar, proprietar (dosar), asigurator, daune[]
   A daune lista elemeit szetosztja:
     - Ha illik a 23-hoz -> JOB.elements
     - Ha nem -> JOB.alteParti[] */
async function ocrConstatare(dataUrl){
  S.ocrRun.constatare=true;render();
  try{
    var p=await callOCR(dataUrlToBase64(dataUrl),'constatare');

    if(p.nrDosar&&p.nrDosar!=='null'&&!JOB._nrDosarEdited)JOB.nrDosar=p.nrDosar;
    if(p.proprietar&&p.proprietar!=='null'&&!JOB._propDosarEdited)JOB.proprietarDosar=p.proprietar;
    if(p.asigurator&&p.asigurator!=='null'&&!JOB._asigEdited)JOB.asigurator=p.asigurator;

    // Nyers szoveg tarolasa (debug + audit)
    JOB.listaDauneRaw=JSON.stringify(p.daune||[],null,2);

    // Daune szetbontasa
    var matchedCaros=0,matchedAlt=0;
    if(Array.isArray(p.daune)){
      for(var di=0;di<p.daune.length;di++){
        var d=p.daune[di];
        if(!d||!d.element)continue;
        var elementName=String(d.element).toLowerCase().trim();
        var action=d.actiune&&d.actiune!=='null'?String(d.actiune).toLowerCase():null;
        var ore=(typeof d.ore==='number'&&d.ore>0&&d.ore<50)?d.ore:null;

        // Prob 1: 23-as karosszeria lista
        var foundKey=null;
        for(var ek in PARTS_KEYWORDS){
          var kws=PARTS_KEYWORDS[ek];
          for(var ki=0;ki<kws.length;ki++){
            if(elementName.indexOf(kws[ki].toLowerCase())>=0){foundKey=ek;break}
          }
          if(foundKey)break;
        }

        if(foundKey){
          if(!JOB.elements[foundKey])JOB.elements[foundKey]={photos:[]};
          JOB.elements[foundKey].status='damaged';       // regi kompat
          JOB.elements[foundKey].statusV2='avariata';     // uj
          if(action){
            JOB.elements[foundKey].workV2=action;
            JOB.elements[foundKey].work=WORK_V2_TO_V1[action]||action;
            if(action==='reparatie'&&ore!==null){
              JOB.elements[foundKey].oraNormata=ore;
            }else{
              JOB.elements[foundKey].oraNormata=null;
            }
          }
          JOB.elements[foundKey]._srcOcr=true;
          if(!JOB.elements[foundKey].photos)JOB.elements[foundKey].photos=[];
          matchedCaros++;
        }else{
          // Prob 2: alt piesa -> alteParti
          var existsIdx=-1;
          for(var ai=0;ai<JOB.alteParti.length;ai++){
            if(JOB.alteParti[ai]._srcOcr&&JOB.alteParti[ai].name.toLowerCase()===elementName){
              existsIdx=ai;break;
            }
          }
          if(existsIdx>=0){
            // Frissitjuk
            JOB.alteParti[existsIdx].status='damaged';
            JOB.alteParti[existsIdx].statusV2='avariata';
            if(action){
              JOB.alteParti[existsIdx].workV2=action;
              JOB.alteParti[existsIdx].work=WORK_V2_TO_V1[action]||action;
              JOB.alteParti[existsIdx].oraNormata=(action==='reparatie'?ore:null);
            }
          }else{
            JOB.alteParti.push({
              id:uid(),
              name:d.element,
              status:'damaged',
              statusV2:'avariata',
              work:action?(WORK_V2_TO_V1[action]||action):null,
              workV2:action||null,
              oraNormata:action==='reparatie'?ore:null,
              photos:[],
              note:'',
              _srcOcr:true,
              ts:new Date().toISOString()
            });
          }
          matchedAlt++;
        }
      }
    }

    if(!JOB.ocrTs)JOB.ocrTs={};
    JOB.ocrTs.constatare=new Date().toISOString();
    await saveJ();
    S.ocrRun.constatare=false;
    toast('Constatare: '+(p.nrDosar||'?')+' / '+matchedCaros+' caros. / '+matchedAlt+' alte','info');
    render();
  }catch(e){
    S.ocrRun.constatare=false;
    toast('Constatare OCR: '+e.message,'err');
    render();
    console.error(e);
  }
}

          var disabled=isPaint && !paintable;
          var checked=!!curOps[wtk];
          var tick=checked?'☑ ':'☐ ';
          if(disabled){
            h+='<div class="wt" style="opacity:.35;cursor:not-allowed">— '+T(wtk)+'</div>';
          }else{
            h+='<div class="wt '+wtClass[wtk]+' '+(checked?'on':'')+'" onclick="sEOp(\''+k+'\',\''+wtk+'\')">'+tick+T(wtk)+'</div>';
          }
        }
        // Ha reparatie be van ikszelve, jelenjen meg a ora input
        if(curOps.reparatie){
          h+='<div class="wt-ora"><input type="number" step="0.1" min="0" max="50" value="'+(e.oraNormata||'')+'" placeholder="h" onchange="sEO(\''+k+'\',this.value)"/><span class="wt-ora-lbl">'+T('oraLbl')+'</span></div>';
        }
        h+='</div>';

        // Foto + note
        h+='<div class="el-det">';
        h+='<div class="el-ph-row">';
        if(ePhUrl)h+='<div class="el-ph done"><img src="'+ePhUrl+'"/><button class="el-ph-del" onclick="dElPh(\''+k+'\')">×</button></div>';
        h+='<div class="el-ph"><input type="file" accept="image/*" capture="environment" onchange="aEP(\''+k+'\',event)"/>'+camMini+'</div>';
        h+='</div>';
        h+='<textarea class="el-nt" placeholder="'+T('noteP')+'" onchange="sEN(\''+k+'\',this.value)">'+(e.note||'')+'</textarea>';
        h+='</div>';
        if(missingPh)h+='<div class="mismatch-warn">'+T('fotoRequired')+'</div>';
      }
      h+='</div>';
    }
    h+='</div></div>';

    // ========= STEP 6: ALTE PIESE =========
    stepNr=dt==='asig'?6:5;
    var altAvList=[];
    for(var ai=0;ai<altP.length;ai++){
      var ap=altP[ai];
      var s=ap.statusV2||(ap.status==='damaged'?'avariata':ap.status==='suggested'?'recomandata':null);
      if(s!=='recomandata')altAvList.push(ap);
    }
    h+='<div class="sec"><div class="sec-h" onclick="tS(\'alteParti\')"><div class="sec-t"><span class="step-n">'+stepNr+'</span> '+T('step6')+' ('+altAv+')</div><span class="sec-badge sb-ok">'+altAv+' av · '+altRec+' rec</span></div><div class="sec-bd '+(S.sec.alteParti?'open':'')+'">';
    h+='<div class="hint" style="margin-bottom:8px">'+T('altePartiHint')+'</div>';
    if(altAvList.length===0)h+='<div class="as-empty">—</div>';
    for(var ai=0;ai<altAvList.length;ai++){
      h+=renderAltItem(altAvList[ai],pk);
    }
    h+='<div class="alt-add"><input id="newAltName" value="'+escapeHtml(S.newAltName||'')+'" placeholder="ex: Far dreapta" oninput="S.newAltName=this.value"/><button onclick="addAltPart()">+</button></div>';
    h+='</div></div>';

    // ========= STEP 7: AFTERSALES =========
    stepNr=dt==='asig'?7:6;
    var allRec=[];
    for(var k in el){
      var e=el[k];
      var s=e.statusV2||(e.status==='suggested'?'recomandata':null);
      if(s==='recomandata')allRec.push({type:'caros',key:k,data:e});
    }
    for(var ai=0;ai<altP.length;ai++){
      var ap=altP[ai];
      var s=ap.statusV2||(ap.status==='suggested'?'recomandata':null);
      if(s==='recomandata')allRec.push({type:'alt',key:ap.id,data:ap});
    }

    h+='<div class="sec" style="border-left:3px solid var(--or)"><div class="sec-h" onclick="tS(\'afterSales\')"><div class="sec-t"><span class="step-n" style="background:var(--or)">'+stepNr+'</span> '+T('step7')+' ('+allRec.length+')</div><span class="sec-badge '+(allRec.length>0?'sb-pt':'sb-ok')+'">'+allRec.length+'</span></div><div class="sec-bd '+(S.sec.afterSales?'open':'')+'">';
    h+='<div class="hint" style="margin-bottom:8px;color:var(--or)">'+T('asHint')+'</div>';
    if(allRec.length===0)h+='<div class="as-empty">'+T('asEmpty')+'</div>';
    else{
      for(var ri=0;ri<allRec.length;ri++){
        var r=allRec[ri];
        if(r.type==='caros')h+=renderRecCarosItem(r.key,r.data,pk);
        else h+=renderAltItem(r.data,pk);
      }
    }
    h+='</div></div>';

    // ========= CHECKLIST =========
    var nrDosarOk=dt!=='asig'||!!job.nrDosar;
    var constOk=dt!=='asig'||hasConstatare;
    var canCl=!!dt&&hasTalon&&constOk&&nrDosarOk&&reqOk&&ovC>=6&&elAssigned===EK.length&&missingAvPh===0&&missingRecPh===0;

    h+='<div class="cl"><div class="cl-t">'+T('closeCond')+'</div>';
    var checks=[{ok:!!dt,t:T('tipOk')},{ok:hasTalon,t:T('talonOk')}];
    if(dt==='asig'){
      checks.push({ok:constOk,t:T('constatareOk')});
      checks.push({ok:nrDosarOk,t:T('nrDosarOk')});
    }
    checks.push({ok:reqOk,t:T('docsOk')});
    checks.push({ok:ovC>=6,t:T('photosOk')+' ('+ovC+'/6)'});
    checks.push({ok:elAssigned===EK.length,t:T('elemOk')+' ('+elAssigned+'/'+EK.length+')'});
    checks.push({ok:missingAvPh===0,t:T('dmgPhOk')});
    checks.push({ok:missingRecPh===0,t:T('recPhOk')});

    for(var ci=0;ci<checks.length;ci++){
      var c=checks[ci];
      h+='<div class="cl-i"><div class="cl-ic '+(c.ok?'ok':'no')+'">'+(c.ok?chkS:xS)+'</div><span class="cl-tx '+(c.ok?'ok':'no')+'">'+c.t+'</span></div>';
    }
    h+='</div><div style="padding:10px 16px"><button class="btn '+(canCl?'btn-g':'btn-o')+'" onclick="closeR()" '+(canCl?'':'style="opacity:.5"')+'>'+(canCl?T('closeBtn'):T('incomplete'))+'</button></div>';
  }

  h+='<div class="bpad"></div>';
  if(S.ts){
    var toastCls='toast';
    if(S.te===1)toastCls+=' err';
    else if(S.te===2)toastCls+=' info';
    h+='<div class="'+toastCls+'">'+S.ts+'</div>';
  }
  document.getElementById('app').innerHTML=h;

  // Refocus
  var naInp=document.getElementById('newAltName');
  if(naInp&&S.newAltName)naInp.focus();
}

function renderAltItem(p,pk){

  var cls='el';

// Multi-select checkbox toggle az `ops` objektumra
window.sEOp=async function(k,op){
  if(!JOB.elements||!JOB.elements[k])return;
  var e=JOB.elements[k];
  if(!e.ops)e.ops={};
  // Kikapcsol / bekapcsol
  var wasOn=!!e.ops[op];
  e.ops[op]=!wasOn;
  // Validacio: Inlocuire+Reparatie nem lehet egyszerre
  if(op==='inlocuire' && e.ops.inlocuire)e.ops.reparatie=false;
  if(op==='reparatie' && e.ops.reparatie)e.ops.inlocuire=false;
  // Validacio: Vopsire+Revopsire nem lehet egyszerre
  if(op==='vopsire' && e.ops.vopsire)e.ops.revopsire=false;
  if(op==='revopsire' && e.ops.revopsire)e.ops.vopsire=false;
  // Backward compat: meg tarjuk a workV2/work mezt is a v1-es oldalakhoz
  if(e.ops.inlocuire)e.workV2='inlocuire';
  else if(e.ops.reparatie)e.workV2='reparatie';
  else if(e.ops.vopsire)e.workV2='vopsire';
  else if(e.ops.revopsire)e.workV2='revopsire';
  else e.workV2=null;
  e.work=WORK_V2_TO_V1[e.workV2]||null;
  // Ha nincs bepikalva reparatie, nullazuk az ora-t
  if(!e.ops.reparatie)e.oraNormata=null;
  await saveJ();render();
};
window.sEO=async function(k,v){
  if(!JOB.elements||!JOB.elements[k])return;
  var n=parseFloat((v||'').toString().replace(',','.'));
  JOB.elements[k].oraNormata=isNaN(n)?null:n;
  await saveJ();
};

  await saveJ();render();
};

window.updAlt=async function(id,field,val){
  if(!JOB.alteParti)return;
  for(var x=0;x<JOB.alteParti.length;x++){
    if(JOB.alteParti[x].id===id){
      if(field==='status'){
        JOB.alteParti[x].statusV2=val;
        JOB.alteParti[x].status=val==='avariata'?'damaged':val==='recomandata'?'suggested':'ok';
      }else if(field==='work'){
        JOB.alteParti[x].workV2=val;
        JOB.alteParti[x].work=WORK_V2_TO_V1[val]||val;
        if(val!=='reparatie')JOB.alteParti[x].oraNormata=null;
      }else if(field==='oraNormata'){
        var n=parseFloat((val||'').toString().replace(',','.'));
        JOB.alteParti[x].oraNormata=isNaN(n)?null:n;
      }else{
        JOB.alteParti[x][field]=val;
      }
      break;
    }
  }
  await saveJ();render();
};

window.delAlt=async function(id){
  if(!confirm('?'))return;
  await deletePhoto('alt_'+id);
  JOB.alteParti=(JOB.alteParti||[]).filter(function(p){return p.id!==id});
  await saveJ();render();
};

window.aAltP=function(id,e){
  var f=e.target.files&&e.target.files[0];if(!f)return;
  resizeFile(f).then(async function(dataUrl){
    try{await uploadPhoto('alt_'+id,dataUrl)}catch(err){toast('Upload: '+err.message,'err');return}
    render();
  });
};
window.dAltPh=async function(id){
  if(!confirm('?'))return;
  await deletePhoto('alt_'+id);
  render();
};

// Close reception
window.closeR=async function(){
  var pk=JOB.photoKeys||{},el=JOB.elements||{},altP=JOB.alteParti||[];
  var hasTalon=!!pk['talon'],hasConstatare=!!pk['doc_constatare'];
  var ovC=0;for(var x=0;x<6;x++){if(pk['ov_'+x])ovC++}
  var reqDocs=JOB.damageType==='asig'?DA:DB;
  var reqOk=true;
  for(var x=0;x<reqDocs.length;x++){if(reqDocs[x].req&&!pk['doc_'+reqDocs[x].id])reqOk=false}

  var elAssigned=0,missAv=0,missRec=0;
  for(var k in el){
    var e=el[k];
    var s=e.statusV2||(e.status==='damaged'?'avariata':e.status==='suggested'?'recomandata':e.status==='ok'?'ok':null);
    if(s)elAssigned++;
    var hasPh=!!pk['elem_'+k];
    if(s==='avariata'&&!hasPh)missAv++;
    if(s==='recomandata'&&!hasPh)missRec++;
  }
  for(var ai=0;ai<altP.length;ai++){
    var ap=altP[ai];
    var s=ap.statusV2||(ap.status==='damaged'?'avariata':ap.status==='suggested'?'recomandata':null);
    var hasPh=!!pk['alt_'+ap.id];
    if(s==='avariata'&&!hasPh)missAv++;
    if(s==='recomandata'&&!hasPh)missRec++;
  }

  var nrDosarOk=JOB.damageType!=='asig'||!!JOB.nrDosar;
  var constOk=JOB.damageType!=='asig'||hasConstatare;

  if(!JOB.damageType||!hasTalon||!constOk||!nrDosarOk||!reqOk||ovC<6||elAssigned!==EK.length||missAv>0||missRec>0){
    toast(T('incomplete'),'err');
    S.sec={talon:1,constatare:1,docs:1,photos:1,elems:1,alteParti:1,afterSales:1};
    render();
    return;
  }

  // Damage report
  var dmg=[],sug=[];
  for(var k in el){
    var e=el[k];
    var s=e.statusV2||(e.status==='damaged'?'avariata':e.status==='suggested'?'recomandata':null);
    if(s==='avariata')dmg.push({key:k,name:T(k),type:'caros',work:e.workV2||e.work,oraNormata:e.oraNormata||null,note:e.note||''});
    else if(s==='recomandata')sug.push({key:k,name:T(k),type:'caros',work:e.workV2||e.work,oraNormata:e.oraNormata||null,note:e.note||''});
  }
  for(var ai=0;ai<altP.length;ai++){
    var ap=altP[ai];
    var s=ap.statusV2||(ap.status==='damaged'?'avariata':ap.status==='suggested'?'recomandata':null);
    if(s==='avariata')dmg.push({key:ap.id,name:ap.name,type:'non-caros',work:ap.workV2||ap.work,oraNormata:ap.oraNormata||null,note:ap.note||''});
    else if(s==='recomandata')sug.push({key:ap.id,name:ap.name,type:'non-caros',work:ap.workV2||ap.work,oraNormata:ap.oraNormata||null,note:ap.note||''});
  }

  JOB.damageReport={
    generated:new Date().toISOString(),
    damaged:dmg,
    suggested:sug,
    totalDamaged:dmg.length,
    totalSuggested:sug.length,
    totalOraReparatie:dmg.reduce(function(s,i){return s+(i.oraNormata||0)},0)
  };

  JOB.phases[1].status='done';
  JOB.phases[1].finished=new Date().toISOString();
  if(JOB.phase<=1){
    JOB.phase=2;
    JOB.phases[2].status='active';
    JOB.phases[2].started=new Date().toISOString();
  }
  await saveJ();
  toast(T('closed')+' — '+dmg.length+' '+T('avariata')+', '+sug.length+' rec','info');
  setTimeout(function(){location.assign('rpw-dosar.html?job='+JOB.id)},1800);
};

loadJob();
</script>
