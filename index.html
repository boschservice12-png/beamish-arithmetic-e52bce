<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f3;--w:#fff;--r:#dc2626;--r50:#fef2f2;--r100:#fee2e2;--r700:#b91c1c;--g:#16a34a;--gl:#dcfce7;--y:#ca8a04;--yl:#fef9c3;--bl:#2563eb;--bll:#dbeafe;--p:#7c3aed;--pl:#ede9fe;--or:#ea580c;--orl:#fff7ed;--tl:#0d9488;--tll:#ccfbf1;--t:#1a1a1a;--t2:#555;--t3:#999;--b:#e5e5e5;--b2:#d0d0d0;--rd:10px}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;-webkit-tap-highlight-color:transparent}
.mono{font-family:'JetBrains Mono','Courier New',monospace}
.layout{display:flex;min-height:100dvh}
.sidebar{width:240px;background:var(--w);border-right:1px solid var(--b);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:40}
.sb-logo{padding:18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--b)}
.sb-logo-c{width:40px;height:40px;border-radius:50%;background:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.sb-logo-ring{width:24px;height:24px;border-radius:50%;background:#fff}
.sb-logo-d{position:absolute;width:11px;height:11px;border-radius:50%;background:var(--r)}
.sb-logo-tx{display:flex;flex-direction:column;gap:3px}
.sb-logo-t{font-size:17px;font-weight:800;line-height:1;color:var(--t)}.sb-logo-t span{color:var(--r)}
.sb-logo-sub{font-size:8px;font-weight:700;color:var(--r);letter-spacing:2.5px;border-top:1px solid var(--b);padding-top:4px}
.sb-nav{flex:1;padding:14px 12px}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 14px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;border-radius:10px;margin-bottom:4px}
.sb-item.on{background:var(--r);color:#fff;font-weight:700}
.sb-item.sb-admin-on{background:var(--gl,#dcfce7);color:var(--g,#16a34a);font-weight:800}
.sb-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.sb-lang{padding:12px 18px;border-top:1px solid var(--b);display:flex;gap:4px}
.lb{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--b);background:var(--w);color:var(--t3);font-family:inherit}.lb.on{background:var(--r);color:#fff;border-color:var(--r)}

/* ═══ Panou (Lean Dashboard) modul ═══ */
.panou-hdr{padding:18px 24px 12px;background:var(--w);border-bottom:1px solid var(--b)}
.panou-label{font-size:11px;font-weight:700;color:var(--r);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.panou-title{font-size:28px;font-weight:800;color:var(--t)}
.panou-tabs{display:inline-flex;gap:4px;background:var(--w);border:1px solid var(--b);border-radius:12px;padding:5px;margin:18px 24px 0}
.panou-tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:8px;font-family:inherit;background:none;border:none}
.panou-tab.on{color:var(--r);background:var(--r50);font-weight:700}
.panou-tab .tab-count{background:var(--bg);color:var(--t2);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;min-width:22px;text-align:center}
.panou-tab.on .tab-count{background:var(--r);color:#fff}
.panou-footer{padding:16px 24px;display:flex;justify-content:flex-end;align-items:center;gap:16px;font-size:12px;color:var(--t3);border-top:1px solid var(--b);margin-top:24px}
.panou-footer .ft-brand{margin-right:auto;color:var(--t2);font-weight:600}
.panou-footer a{color:var(--t3);text-decoration:underline;cursor:pointer}
.prm-wrap{padding:18px 24px 0}
.prm-hint{font-size:12px;color:var(--t2);background:var(--r50);border:1px solid var(--r100);border-radius:10px;padding:10px 14px;margin-bottom:16px}
.prm-card{background:var(--w);border:1px solid var(--b);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.prm-ct{font-size:11px;font-weight:800;color:var(--r);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
.prm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.prm-f{display:flex;flex-direction:column;gap:4px}
.prm-f label{font-size:11px;font-weight:600;color:var(--t3)}
.prm-f input{border:1px solid var(--b);border-radius:8px;padding:9px 11px;font-size:13px;font-weight:600;color:var(--t);font-family:inherit;outline:none}
.prm-f input:focus{border-color:var(--r)}
.prm-capac{margin-top:12px;padding:10px 14px;background:var(--gl);border:1px solid var(--g);border-radius:8px;font-size:13px;color:var(--g);font-weight:600}
.panou-tbl-wrap{padding:14px 24px 24px;background:var(--bg);min-height:60vh}
.panou-tbl{width:100%;border-collapse:separate;border-spacing:0 6px;font-size:13px}
.panou-tbl th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.panou-tbl td{padding:12px;vertical-align:middle;background:var(--w);border-top:1px solid var(--b);border-bottom:1px solid var(--b)}
.panou-tbl td:first-child{border-left:1px solid var(--b);border-radius:8px 0 0 8px}
.panou-tbl td:last-child{border-right:1px solid var(--b);border-radius:0 8px 8px 0}
.panou-row.row-ok td{background:#dcfce7;border-color:#86efac}
.panou-row.row-ok td:first-child{border-left:3px solid var(--g)}
.panou-row.row-warn td{background:#fef9c3;border-color:#fde047}
.panou-row.row-warn td:first-child{border-left:3px solid var(--y)}
.panou-pill{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:14px;font-size:10px;font-weight:700;white-space:nowrap}
.pill-ready{background:var(--g);color:#fff}
.pill-wait{background:var(--y);color:#fff}
.pill-prog{background:var(--t3);color:#fff}
.cond-row{display:inline-flex;gap:4px;align-items:center;cursor:help}
.cond-ic{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
.cond-ic.ok{background:var(--g)}
.cond-ic.no{background:var(--r)}
.cond-ic.comandat{background:var(--or)}
.cond-ic svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:3}

/* Cond modal */
.cond-modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.cond-box{background:var(--w);border-radius:var(--rd);padding:22px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto}
.cond-mt{font-size:18px;font-weight:800;margin-bottom:4px}
.cond-ms{font-size:12px;color:var(--t3);margin-bottom:18px}
.cond-q{margin-bottom:14px}
.cond-q-label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px}
.cond-btns{display:flex;gap:6px;flex-wrap:wrap}
.cb{flex:1;padding:10px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--b);background:var(--w);color:var(--t3);font-family:inherit;min-width:70px;transition:all .15s}
.cb.no-on{background:var(--r);color:#fff;border-color:var(--r)}
.cb.yes-on{background:var(--g);color:#fff;border-color:var(--g)}
.cb.cmd-on{background:var(--or);color:#fff;border-color:var(--or)}
.cond-actions{display:flex;gap:8px;margin-top:18px}
.cond-actions button{flex:1;padding:11px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.cond-actions .cancel{background:var(--w);color:var(--t2);border:1.5px solid var(--b2)}
.cond-actions .submit{background:var(--g);color:#fff}
.panou-row{cursor:pointer}
.panou-row:hover td{background-color:rgba(220,38,38,.04)}
.panou-row.row-ok:hover td{background-color:#bbf7d0}
.panou-row.row-warn:hover td{background-color:#fef08a}
.panou-hint{font-size:11px;color:var(--t3);padding:6px 24px;background:var(--w);border-bottom:1px solid var(--b);text-align:center;font-style:italic}
.edit-btn{padding:7px 16px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.edit-btn.eb-go{background:var(--g);color:#fff}
.edit-btn.eb-no{background:var(--b2);color:var(--t3);cursor:not-allowed}
.edit-btn.eb-r{background:var(--r);color:#fff}
.edit-btn.eb-del{background:var(--r50,#fef2f2);color:var(--r);border:1px solid var(--r100,#fee2e2);padding:7px 10px}
.edit-btn.eb-del:hover{background:var(--r100,#fee2e2)}
.edit-btn.eb-ratat{background:var(--yl,#fef9c3);color:var(--y,#ca8a04);border:1px solid #fde68a}
.edit-btn.eb-ratat:hover{background:#fde68a}
.edit-btn.eb-react{background:var(--gl,#dcfce7);color:var(--g,#16a34a);border:1px solid #bbf7d0}
.edit-btn.eb-react:hover{background:#bbf7d0}
.wa-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:#25d366;text-decoration:none;font-size:16px;cursor:pointer;border:none;color:#fff}
.wa-btn.dark{background:#1a1a1a}
.wa-btn.dis{background:var(--b);cursor:not-allowed;opacity:.5}
.wa-btn svg{width:16px;height:16px;fill:#fff}

/* Programare modal */
.panou-hdr-actions{display:flex;justify-content:space-between;align-items:flex-end;padding:18px 24px 12px;background:var(--w);border-bottom:1px solid var(--b);gap:16px;flex-wrap:wrap}
.btn-prog-new{background:var(--r);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.btn-prog-new:hover{background:var(--r700)}
.prog-modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.prog-box{background:var(--w);border-radius:var(--rd);padding:22px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.prog-t{font-size:18px;font-weight:800;margin-bottom:4px}
.prog-s{font-size:12px;color:var(--t3);margin-bottom:16px}
.prog-field{margin-bottom:14px}
.prog-field label{display:block;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.prog-field input{width:100%;border:1.5px solid var(--b);border-radius:8px;padding:10px 12px;font-size:14px;font-weight:600;font-family:inherit;outline:none}
.prog-field input:focus{border-color:var(--r)}
.prog-actions{display:flex;gap:8px;margin-top:6px}
.prog-actions button{flex:1;padding:11px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.prog-actions .cancel{background:var(--w);color:var(--t2);border:1.5px solid var(--b2)}
.prog-actions .submit{background:var(--g);color:#fff}

/* ═══ Statistici modul ═══ */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:0 24px 24px}
.stat-card{background:var(--w);border:1px solid var(--b);border-radius:var(--rd);padding:16px;min-height:180px}
.stat-card.full{grid-column:span 2}
.stat-card-h{font-size:11px;font-weight:700;color:var(--r);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.stat-card-v{font-size:32px;font-weight:800;color:var(--t);margin:8px 0}
.stat-card-sub{font-size:11px;color:var(--t3);margin-top:4px}
.stat-period{display:inline-flex;gap:2px;background:var(--w);border:1px solid var(--b);border-radius:8px;padding:3px}
.stat-period button{padding:6px 12px;border-radius:6px;border:none;background:transparent;font-size:11px;font-weight:600;color:var(--t3);cursor:pointer;font-family:inherit}
.stat-period button.on{background:var(--r);color:#fff}
.stat-canvas{position:relative;height:200px}
.stat-canvas.tall{height:260px}
.stuck-list{margin-top:6px}
.stuck-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;background:var(--bg);margin-bottom:6px;font-size:12px}
.stuck-row .stuck-id{font-weight:700;font-family:'JetBrains Mono',monospace}
.stuck-row .stuck-meta{font-size:10px;color:var(--t3)}
.stuck-row .stuck-days{font-weight:800;color:var(--r)}
.stat-empty{text-align:center;color:var(--t3);padding:30px 0;font-size:12px;font-style:italic}
.ftr-num{font-size:48px;font-weight:900;color:var(--g)}
.ftr-num.bad{color:var(--r)}.ftr-num.warn{color:var(--y)}
@media (max-width:900px){.stat-grid{grid-template-columns:1fr}.stat-card.full{grid-column:span 1}}
.main{margin-left:240px;flex:1}
.partner-bar{background:var(--r);padding:14px 24px;display:flex;align-items:center;gap:10px;color:#fff}
.partner-bar svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2}
.pb-name{font-size:15px;font-weight:700}
.tabs{background:var(--w);border-bottom:1px solid var(--b);padding:0 24px;display:flex}
.tab{padding:14px 20px;font-size:13px;color:var(--t3);font-weight:500;cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px}
.tab.on{color:var(--r);border-bottom-color:var(--r);font-weight:600}
.tab svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.page-hdr{padding:20px 24px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
.ph-label{font-size:11px;font-weight:700;color:var(--r);letter-spacing:1.5px;text-transform:uppercase}
.ph-title{font-size:22px;font-weight:800;margin-top:2px}
.btn{border:none;border-radius:var(--rd);padding:10px 20px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.btn-r{background:var(--r);color:#fff}.btn-r:active{background:var(--r700)}
.btn-o{background:var(--w);color:var(--t2);border:1px solid var(--b2)}
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;margin:0 24px;background:var(--b);border:1px solid var(--b);border-radius:var(--rd);overflow:hidden}
.stat-cell{background:var(--w);padding:12px 16px}
.stat-cell-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.stat-cell-val{font-size:22px;font-weight:800;margin-top:2px}
.tbl-wrap{margin:16px 24px;background:var(--w);border:1px solid var(--b);border-radius:var(--rd);overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;min-width:600px}
.tbl thead th{padding:12px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--r);border-bottom:1px solid var(--b)}
.tbl thead th.c{text-align:center}
.tbl tbody tr{border-bottom:1px solid var(--bg)}.tbl tbody tr:last-child{border-bottom:none}
.tbl tbody tr:hover{background:var(--r50)}
.tbl td{padding:10px 16px;font-size:13px;vertical-align:middle}.tbl td.c{text-align:center}
.badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:10px;font-weight:700}
.badge-r{background:var(--r100);color:var(--r700)}.badge-g{background:var(--gl);color:var(--g)}.badge-y{background:var(--yl);color:var(--y)}.badge-bl{background:var(--bll);color:var(--bl)}.badge-p{background:var(--pl);color:var(--p)}.badge-or{background:var(--orl);color:var(--or)}.badge-tl{background:var(--tll);color:var(--tl)}
.prog{height:4px;background:var(--bg);border-radius:2px;display:flex;gap:1px;overflow:hidden;width:100px}
.prog-s{height:100%;border-radius:1px;flex:1}
.ps1{background:var(--r)}.ps2{background:var(--or)}.ps3{background:var(--y)}.ps4{background:var(--bl)}.ps5{background:var(--p)}.ps6{background:var(--tl)}.ps7{background:var(--g)}.pse{background:var(--b)}
.psr{background:var(--r)}.psy{background:var(--y)}.psg{background:var(--g)}
.act-btn{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.cell-inp{display:block;width:100%;min-width:90px;border:1px solid var(--b2);border-radius:6px;padding:4px 6px;font-size:11px;font-family:inherit;margin:2px 0;outline:none;background:#fffbeb}
.cell-inp:focus{border-color:var(--r)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:8px;margin-bottom:12px}
.kpi-card{background:#fff;border:1px solid var(--b);border-radius:10px;padding:10px 8px;text-align:center}
.kpi-v{font-size:22px;font-weight:800;line-height:1.1}
.kpi-l{font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-top:3px}
.yr-tbl{width:100%;border-collapse:collapse;font-size:12px}
.yr-tbl th,.yr-tbl td{padding:6px 10px;border-bottom:1px solid var(--b);text-align:right}
.yr-tbl th:first-child,.yr-tbl td:first-child{text-align:left}
.yr-tbl tr.tot{background:var(--bg);font-weight:800}
.act-data{background:#eff6ff;color:#1d4ed8;font-size:14px;font-weight:800}
.act-data.on{background:#16a34a;color:#fff}
.act-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.act-edit{background:var(--r);color:#fff}.act-del{background:var(--bg);color:var(--t3)}
.empty{text-align:center;padding:60px 24px;color:var(--t3)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--w);padding:12px 20px;border-radius:var(--rd);font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.12);border-left:4px solid var(--g);z-index:200}
.loading{text-align:center;padding:60px;color:var(--t3);font-size:14px}
@media(max-width:768px){.sidebar{width:56px}.sb-logo-t,.sb-item span,.sb-lang{display:none}.sb-logo{padding:14px 12px;justify-content:center}.sb-item{padding:12px 0;justify-content:center;margin-right:0;border-radius:0}.sb-item.on{border-radius:0;margin-right:0}.main{margin-left:56px}.stat-row{grid-template-columns:repeat(3,1fr)}.page-hdr{padding:16px}.tbl-wrap{margin:12px 16px}}
@media(max-width:480px){.stat-row{grid-template-columns:1fr 1fr}}
</style>

// ====== PARAMETRI — single source of truth (rpw_config, megosztva az evaluare/deviz oldalakkal) ======
var CONFIG={

async function loadJobs(){
  // 1. localStorage lista
  var cached=localStorage.getItem('rpw_jobs_list');
  if(cached){try{JOBS=JSON.parse(cached)}catch(e){}}
  // 2. Individual job-ok localStorage-ból (import után)
  var allKeys=Object.keys(localStorage);
  allKeys.forEach(function(k){
    if(k.indexOf('rpw_job_'===0||k.startsWith('rpw_job_'))&&k!=='rpw_jobs_list'){
      try{
        var j=JSON.parse(localStorage.getItem(k));
        if(j&&j.id&&j.phase){
          var exists=JOBS.some(function(x){return x.id===j.id});
          if(!exists)JOBS.push(j);
        }
      }catch(e){}
    }
  });
  render();
  // 3. Supabase — max 4mp timeout
  try{
    var p=sb.from('rpw_jobs').select('id,data,updated_at').order('updated_at',{ascending:false});
    var t=new Promise(function(_,rej){setTimeout(function(){rej('timeout')},4000)});
    var res=await Promise.race([p,t]);
    if(res&&!res.error&&res.data){
      var sbJobs=(res.data||[]).map(function(r){return r.data}).filter(function(d){return d&&d.phase});
      sbJobs.forEach(function(sj){
        var idx=JOBS.findIndex(function(x){return x.id===sj.id});
        if(idx>=0)JOBS[idx]=sj;else JOBS.push(sj);
      });
      var lite=JOBS.map(function(j){return{id:j.id,number:j.number,auto:j.auto,plate:j.plate,vin:j.vin,client:j.client,phone:j.phone,phase:j.phase,created:j.created,phases:j.phases}});
      try{localStorage.setItem('rpw_jobs_list',JSON.stringify(lite))}catch(e){}
      render();
    }
  }catch(e){console.warn('SB offline, localStorage OK')}
}
async function saveJob(job){
  // 1. localStorage ELOSZOR
  try{localStorage.setItem('rpw_job_'+job.id,JSON.stringify(job));localStorage.setItem('rpw_job_ts_'+job.id,new Date().toISOString())}catch(e){}
  try{localStorage.removeItem("rpw_jobs_list")}catch(e){}
  // 2. Supabase — max 4mp timeout
  try{
    var p=sb.from('rpw_jobs').upsert({id:job.id,data:job,updated_at:new Date().toISOString()});
    var t=new Promise(function(_,rej){setTimeout(function(){rej('timeout')},4000)});
    await Promise.race([p,t]);
  }catch(e){console.warn('SB offline, localStorage OK')}
}
var _freshAt={};
async function freshJob(id){
  var idx=JOBS.findIndex(function(x){return x.id===id});
  if(_freshAt[id]&&(Date.now()-_freshAt[id])<15000)return idx>=0?JOBS[idx]:null;
  var j=null;
  try{
    var p=sb.from('rpw_jobs').select('data,updated_at').eq('id',id).single();
    var t=new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'))},3000)});
    var r=await Promise.race([p,t]);
    if(r&&r.data&&r.data.data)j=r.data.data;
  }catch(e){}
  if(!j){try{var c=localStorage.getItem('rpw_job_'+id);if(c)j=JSON.parse(c)}catch(e){}}
  if(!j&&idx>=0)j=JOBS[idx];
  if(j&&idx>=0)JOBS[idx]=j;
  _freshAt[id]=Date.now();
  return j;
}
async function deleteJob(id){
  try{localStorage.removeItem("rpw_jobs_list")}catch(e){}
  try{localStorage.removeItem('rpw_job_'+id)}catch(e){}
  JOBS=JOBS.filter(function(j){return j.id!==id});
  render();
  try{await sb.from('rpw_jobs').delete().eq('id',id);}catch(e){console.error('Delete SB:',e)}
}

// ─── INDEXEDDB (fotok) ────────────────────────────────────────────────────
var _idb=null;
function openIDB(){
  return new Promise(function(res,rej){
    if(_idb){res(_idb);return}
    var req=indexedDB.open('rpw_photos',1);
    req.onupgradeneeded=function(e){e.target.result.createObjectStore('photos')};
    req.onsuccess=function(e){_idb=e.target.result;res(_idb)};
    req.onerror=function(){rej('IDB failed')};
  });
}
async function idbPut(key,val){
  var db=await openIDB();
  return new Promise(function(res,rej){
    var tx=db.transaction('photos','readwrite');
    tx.objectStore('photos').put(val,key);
    tx.oncomplete=res;tx.onerror=rej;
  });
}

// ─── ZIP IMPORT ────────────────────────────────────────────────────────────
window.triggerImport=function(){document.getElementById('zipImportInput').click()};
window.importZIP=async function(e){
  var file=e.target.files&&e.target.files[0];
  if(!file)return;
  try{
    toast('Se importa ZIP...');
    var zip=await JSZip.loadAsync(file);
    // Gaseste receptie_report.json
    var reportFile=null;
    zip.forEach(function(path,f){if(path.indexOf('receptie_report.json')>=0)reportFile=f});
    if(!reportFile){toast('ZIP invalid: nu contine receptie_report.json');return}
    var reportStr=await reportFile.async('string');
    var report=JSON.parse(reportStr);
    // Reconstruieste job
    var job={
      id:report.job.id,
      number:report.job.number||'',
      client:report.job.client||'',
      phone:report.job.phone||'',
      note:report.job.note||'',
      plate:report.vehicle.plate||'',
      vin:report.vehicle.vin||'',
      brand:report.vehicle.brand||'',
      auto:report.vehicle.auto||'',
      year:report.vehicle.year||'',
      proprietar:report.vehicle.proprietar||'',
      damageType:report.damageType||null,
      elements:report.elements||{},
      damageReport:report.damageReport||{},
      created:report.generatedAt||new Date().toISOString(),
      phase:2,
      photoKeys:{},
      phases:{1:{status:'done',finished:report.generatedAt},2:{status:'active',started:report.generatedAt},3:{status:'pending'},4:{status:'pending'},5:{status:'pending'},6:{status:'pending'},7:{status:'pending'}}
    };
    // Importa fotók IndexedDB-be
    var photoCount=0;
    var photoPromises=[];
    zip.forEach(function(path,f){
      if(path.indexOf('photos/')>=0&&path.indexOf('.jpg')>=0){
        var key=path.split('/').pop().replace('.jpg','');
        photoPromises.push(
          f.async('base64').then(function(b64){
            var fullB64='data:image/jpeg;base64,'+b64;
            job.photoKeys[key]=true;
            photoCount++;
            return idbPut(job.id+'_'+key,fullB64);
          })
        );
      }
    });
    await Promise.all(photoPromises);
    // Mentés localStorage
    try{localStorage.setItem('rpw_job_'+job.id,JSON.stringify(job))}catch(err){}
    // Lista frissítés
    var exists=JOBS.some(function(x){return x.id===job.id});
    if(!exists)JOBS.unshift(job);
    else{var idx=JOBS.findIndex(function(x){return x.id===job.id});JOBS[idx]=job}
    try{localStorage.removeItem('rpw_jobs_list')}catch(err){}
    render();
    toast('Import OK: '+(job.number||job.id)+' — '+photoCount+' foto');
  }catch(err){toast('Import eroare: '+err.message)}

function computeConditions(job){
  var c=job.conditions||{};
  var prog=!!c.programare, loc=!!c.loc, om=!!c.om, wa=!!c.whatsapp;
  // piese: false / 'comandat' / 'livrat'  (backward-compat: true → 'livrat')
  var piese=c.piese;
  if(piese===true)piese='livrat';
  if(!piese)piese=false;
  var pieseOK=(piese==='livrat');
  return {
    programare:prog, loc:loc, om:om, piese:piese, whatsapp:wa,
    all: prog && loc && om && pieseOK && wa,
    count: (prog?1:0)+(loc?1:0)+(om?1:0)+(pieseOK?1:0)+(wa?1:0)
  };
}

function categorizeJob(job){
  var p=job.programare||{};
  // Closed → arhivate
  if(job.phase===7 || p.status==='arhivat') return 'arhivate';
  // Cancelled → ratate
  if(p.status==='ratat') return 'ratate';
  // In progress → lucrari (NEM panou)
  if(p.status==='in_lucru') return 'lucrari';
  // Legacy backward-compat: regi lucrare-ek programare nelkul, phase>=1
  if(!p.status && job.phase>=1) return 'lucrari';
  // Default: Panou/Viitoare
  return 'viitoare';
}

function renderCondIcon(state, type){
  // type: 'piese' → 3 allapot, false/comandat/livrat
  if(type==='piese'){
    if(state==='livrat') return '<span class="cond-ic ok"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>';
    if(state==='comandat') return '<span class="cond-ic comandat"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>';
    return '<span class="cond-ic no"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>';
  }
  if(state) return '<span class="cond-ic ok"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>';
  return '<span class="cond-ic no"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>';
}

function statPeriodRange(period){
  var now=new Date(), start;
  if(period==='today'){start=new Date(now);start.setHours(0,0,0,0)}
  else if(period==='week'){start=new Date(now);start.setDate(now.getDate()-7);start.setHours(0,0,0,0)}
  else if(period==='month'){start=new Date(now);start.setMonth(now.getMonth()-1);start.setHours(0,0,0,0)}
  else if(period==='year'){start=new Date(now);start.setFullYear(now.getFullYear()-1);start.setHours(0,0,0,0)}
  else {start=new Date(0)}
  return {start:start, end:now};
}
function filterByPeriod(jobs,period){
  if(period==='all')return jobs.slice();
  var range=statPeriodRange(period);
  return jobs.filter(function(j){var d=j.created?new Date(j.created):null;return d && d>=range.start && d<=range.end});
}
function kpiPhaseDistribution(jobs){
  var dist=[0,0,0,0,0,0,0];
  jobs.forEach(function(j){if(j.phase>=1&&j.phase<=7)dist[j.phase-1]++});
  return dist;
}
function kpiThroughput(jobs,buckets){
  buckets=buckets||12;
  var now=new Date(), weekMs=7*24*60*60*1000;
  var data=new Array(buckets).fill(0), labels=new Array(buckets).fill('');
  for(var i=0;i<buckets;i++){
    var weekEnd=new Date(now-(buckets-1-i)*weekMs);
    var weekStart=new Date(weekEnd-weekMs);
    labels[i]=(weekStart.getMonth()+1)+'/'+weekStart.getDate();
    jobs.forEach(function(j){
      if(j.phase===7 && j.phases && j.phases[7] && j.phases[7].finished){
        var d=new Date(j.phases[7].finished);
        if(d>=weekStart && d<weekEnd)data[i]++;
      }
    });
  }
  return {labels:labels, data:data};
}
function kpiAvgCycleTime(jobs){
  var times=[];
  jobs.forEach(function(j){
    if(j.phase===7 && j.phases && j.phases[1] && j.phases[7] && j.phases[1].started && j.phases[7].finished){
      var s=new Date(j.phases[1].started), e=new Date(j.phases[7].finished);
      var days=(e-s)/(1000*60*60*24);
      if(days>=0 && days<365)times.push(days);
    }
  });
  if(!times.length)return null;
  var avg=times.reduce(function(a,b){return a+b},0)/times.length;
  return {avg:avg, count:times.length, min:Math.min.apply(null,times), max:Math.max.apply(null,times)};
}
function kpiPhaseAverages(jobs){
  var sums=[0,0,0,0,0,0,0],counts=[0,0,0,0,0,0,0];
  jobs.forEach(function(j){
    if(!j.phases)return;
    for(var p=1;p<=7;p++){
      var ph=j.phases[p];if(!ph||!ph.started||!ph.finished)continue;
      var s=new Date(ph.started), e=new Date(ph.finished);
      var hrs=(e-s)/(1000*60*60);
      if(hrs>=0 && hrs<24*365){sums[p-1]+=hrs;counts[p-1]++}
    }
  });
  return sums.map(function(s,i){return counts[i]?s/counts[i]:0});
}
function kpiStuckJobs(jobs,thresholdDays){
  var now=new Date(), stuck=[];
  jobs.forEach(function(j){
    if(j.phase===7)return;
    if(!j.phases || !j.phases[j.phase] || !j.phases[j.phase].started)return;
    var s=new Date(j.phases[j.phase].started);
    var days=(now-s)/(1000*60*60*24);
    if(days>=thresholdDays){stuck.push({id:j.id, number:j.number||j.id, phase:j.phase, days:Math.floor(days), plate:j.plate||'', client:j.client||''})}
  });
  return stuck.sort(function(a,b){return b.days-a.days});
}
function kpiFirstTimeRight(jobs){
  var done=jobs.filter(function(j){return j.phase===7});
  if(!done.length)return null;
  var reconst=done.filter(function(j){
    if(!j.reconst)return false;
    var hasRows=j.reconst.rows && j.reconst.rows.length>0;
    var hasPhase3=j.phases && j.phases[3] && j.phases[3].started;
    return hasRows || hasPhase3;
  });
  var ftrCount=done.length-reconst.length;
  return {total:done.length, ftr:ftrCount, reconst:reconst.length, pct:Math.round((ftrCount/done.length)*100)};
}

function jobHours(j){
  var tin=0,vop=0;
  (j.bodyRows||[]).forEach(function(r){tin+=parseFloat(r.hours)||0});
  (j.paintRows||[]).forEach(function(r){vop+=parseFloat(r.hours)||0});
  return {tin:tin,vop:vop,tot:tin+vop};
}
function kpiHourSeries(period){
  var now=new Date(),buckets=[],labels=[];
  function push(st,en,l){buckets.push({s:st,e:en,tin:0,vop:0});labels.push(l)}
  if(period==='today'||period==='week'){for(var i=6;i>=0;i--){var d=new Date(now);d.setDate(now.getDate()-i);d.setHours(0,0,0,0);var e=new Date(d);e.setDate(d.getDate()+1);push(d,e,(d.getMonth()+1)+'/'+d.getDate())}}
  else if(period==='month'){for(var i=3;i>=0;i--){var e2=new Date(now.getTime()-i*7*864e5);var s2=new Date(e2.getTime()-7*864e5);push(s2,e2,(s2.getMonth()+1)+'/'+s2.getDate())}}
  else{for(var i=11;i>=0;i--){var s3=new Date(now.getFullYear(),now.getMonth()-i,1);var e3=new Date(now.getFullYear(),now.getMonth()-i+1,1);push(s3,e3,(s3.getMonth()+1)+'/'+String(s3.getFullYear()).slice(-2))}}
  JOBS.forEach(function(j){
    if(j.phase!==7||!j.phases||!j.phases[7]||!j.phases[7].finished)return;
    var d=new Date(j.phases[7].finished),hh=jobHours(j);
    buckets.forEach(function(b){if(d>=b.s&&d<b.e){b.tin+=hh.tin;b.vop+=hh.vop}});
  });
  return {labels:labels,tin:buckets.map(function(b){return +b.tin.toFixed(1)}),vop:buckets.map(function(b){return +b.vop.toFixed(1)})};
}
function kpiYearTable(year){
  var rows=[];for(var m=0;m<12;m++)rows.push({n:0,tin:0,vop:0});
  JOBS.forEach(function(j){
    if(j.phase!==7||!j.phases||!j.phases[7]||!j.phases[7].finished)return;
    var d=new Date(j.phases[7].finished);
    if(d.getFullYear()!==year)return;
    var hh=jobHours(j),m=d.getMonth();
    rows[m].n++;rows[m].tin+=hh.tin;rows[m].vop+=hh.vop;
  });
  return rows;
}

window.upParam=function(path,val,type){
  var parts=path.split('.');
  var v=type==='number'?(parseFloat((val||'').toString().replace(',','.'))||0):val;
  if(!CONFIG[parts[0]])CONFIG[parts[0]]={};
  CONFIG[parts[0]][parts[1]]=v;
  saveConfig();
  if(parts[0]==='posturi')render();
};

      if(p.daune)j.listaDauneRaw=JSON.stringify(p.daune,null,2);

      await saveJob(j);
      S.panouTab='viitoare';
      toast('Dosar creat: '+(j.nrDosar||'?')+' · '+(j.asigurator||'?')+' · '+(j.proprietarDosar||'?'));
      render();
    }catch(err){toast('OCR eroare: '+err.message)}
  };
  r.readAsDataURL(f);
};
window.closeProgModal=function(){S.showProg=0;S.progPlate='';S.progPhone='';render()};
window.submitProgramare=async function(){
  var plate=(S.progPlate||'').trim().toUpperCase();
  var phone=(S.progPhone||'').trim();
  if(!plate || !phone){toast(T('prog_required'));return}
  try{
    var cnt=JOBS.length+1;
    var yr=new Date().getFullYear().toString().slice(-2);
    var num='MS-'+yr+'-'+String(cnt).padStart(3,'0');
    var j={
      id:'RPW-'+String(Date.now()).slice(-6),
      number:num,
      auto:'',vin:'',plate:plate,client:'',phone:phone,
      note:'',szinkod:'',damageType:(S.progAsig?'asig':null),
      created:new Date().toISOString(),
      phase:0,
      photos:[],docs:[],panels:{},elements:{},materials:[],
      programare:{date:null,time:null,confirmed:false,status:'viitor'},
      conditions:{programare:true,loc:false,om:false,piese:false,whatsapp:false},

    render();
  }catch(e){toast('Error: '+e.message)}
};

// === WhatsApp klick = auto-set + open wa.me ===
window.clickWhatsApp=async function(jobId,phoneClean){
  var job=await freshJob(jobId);
  if(!job)return;
  if(!job.conditions)job.conditions={};
  job.conditions.whatsapp=true;
  await saveJob(job);
  toast(T('wa_sent_marked'));
  // Megnyit a wa.me-t uj tabban
  var url='https://wa.me/'+phoneClean;
  window.open(url,'_blank','noopener');
  render();
};

// === Conditii Modal handlers ===

    h+='<div class="cond-ms">'+subTxt+'</div>';
    // programare
    h+='<div class="cond-q"><span class="cond-q-label">📅 '+T('cond_q_prog')+'</span><div class="cond-btns">';
    h+='<button class="cb '+(d.programare===false?'no-on':'')+'" onclick="setCondDraft(\'programare\',false)">'+T('no_nu')+'</button>';
    h+='<button class="cb '+(d.programare===true?'yes-on':'')+'" onclick="setCondDraft(\'programare\',true)">'+T('yes_da')+'</button>';

    h+='<div class="cond-q"><span class="cond-q-label">🏢 '+T('cond_q_loc')+'</span><div class="cond-btns">';
    h+='<button class="cb '+(d.loc===false?'no-on':'')+'" onclick="setCondDraft(\'loc\',false)">'+T('no_nu')+'</button>';
    h+='<button class="cb '+(d.loc===true?'yes-on':'')+'" onclick="setCondDraft(\'loc\',true)">'+T('yes_da')+'</button>';
    h+='</div></div>';
    // om
    h+='<div class="cond-q"><span class="cond-q-label">👤 '+T('cond_q_om')+'</span><div class="cond-btns">';
    h+='<button class="cb '+(d.om===false?'no-on':'')+'" onclick="setCondDraft(\'om\',false)">'+T('no_nu')+'</button>';
    h+='<button class="cb '+(d.om===true?'yes-on':'')+'" onclick="setCondDraft(\'om\',true)">'+T('yes_da')+'</button>';
    h+='</div></div>';
    // piese — 3 allapot
    h+='<div class="cond-q"><span class="cond-q-label">📦 '+T('cond_q_piese')+'</span><div class="cond-btns">';
    h+='<button class="cb '+(!d.piese||d.piese===false?'no-on':'')+'" onclick="setCondDraft(\'piese\',false)">'+T('piese_nu')+'</button>';
    h+='<button class="cb '+(d.piese==='comandat'?'cmd-on':'')+'" onclick="setCondDraft(\'piese\',\'comandat\')">'+T('piese_comandat')+'</button>';
    h+='<button class="cb '+(d.piese==='livrat'?'yes-on':'')+'" onclick="setCondDraft(\'piese\',\'livrat\')">'+T('piese_livrat')+'</button>';
    h+='</div></div>';
    // whatsapp
    h+='<div class="cond-q"><span class="cond-q-label">💬 '+T('cond_q_wa')+'</span><div class="cond-btns">';
    h+='<button class="cb '+(d.whatsapp===false?'no-on':'')+'" onclick="setCondDraft(\'whatsapp\',false)">'+T('no_nu')+'</button>';
    h+='<button class="cb '+(d.whatsapp===true?'yes-on':'')+'" onclick="setCondDraft(\'whatsapp\',true)">'+T('yes_da')+'</button>';
    h+='</div></div>';
    // actions
    h+='<div class="cond-actions"><button class="cancel" onclick="closeCondModal()">'+T('btn_cancel')+'</button><button class="submit" onclick="saveCondModal()">'+T('btn_save')+'</button></div>';
    h+='</div></div>';
  }
  return h;
}
window.openCondModal=async function(jobId){
  var job=await freshJob(jobId);
  if(!job)return;
  var c=job.conditions||{};
  // backward-compat: piese===true → 'livrat'
  var piese=c.piese; if(piese===true)piese='livrat'; if(!piese)piese=false;
  S.condDraft={
    programare: !!c.programare,
    loc: !!c.loc,
    om: !!c.om,
    piese: piese,
    whatsapp: !!c.whatsapp
  };
  S.showCondModal=jobId;
  render();
};
window.closeCondModal=function(){S.showCondModal=0;S.condDraft=null;render()};
window.toggleEditJob=function(id){var closing=(S.editJobId===id);S.editJobId=closing?null:id;render();if(closing)toast(T('field_saved'))};
window.updJobField=async function(id,f,v){var j=await freshJob(id);if(!j)return;if(f==='plate'||f==='vin')v=String(v).toUpperCase();j[f]=v;await saveJob(j)};
window.setCondDraft=function(key,val){
  if(!S.condDraft)return;
  S.condDraft[key]=val;
  render();
};
window.saveCondModal=async function(){
  if(!S.condDraft||!S.showCondModal)return;
  var job=await freshJob(S.showCondModal);
  if(!job)return;
  if(!job.conditions)job.conditions={};
  job.conditions.programare = S.condDraft.programare;
  job.conditions.loc = S.condDraft.loc;
  job.conditions.om = S.condDraft.om;
  job.conditions.piese = S.condDraft.piese;
  job.conditions.whatsapp = S.condDraft.whatsapp;
  await saveJob(job);
  S.showCondModal=0;
  S.condDraft=null;
  toast(T('cond_saved'));
  render();
};

// === Deschide lucrarea (Panou → Lucrari) ===
window.deschideLucrare=async function(jobId){
  var job=await freshJob(jobId);
  if(!job)return;
  if(!job.conditions||!job.conditions.whatsapp){toast(T('no_wa_yet'),1);return}
  if(!job.programare)job.programare={};
  job.programare.status='in_lucru';
  if(!job.phase||job.phase<1)job.phase=1;
  if(!job.phases)job.phases={};
  for(var p=1;p<=7;p++){if(!job.phases[p])job.phases[p]={status:'pending'}}
  if(job.phases[1].status==='pending'){job.phases[1].status='active';job.phases[1].started=new Date().toISOString()}
  await saveJob(job);
  location.assign('rpw-recepcio.html?job='+job.id);
};

window.markRatat=async function(jobId){
  var job=await freshJob(jobId);
  if(!job)return;
  if(!job.programare)job.programare={};
  job.programare.status='ratat';
  await saveJob(job);
  toast(T('moved_ratat'));
  render();
};

window.reactiveaza=async function(jobId){
  var job=await freshJob(jobId);
  if(!job)return;
  if(!job.programare)job.programare={};
  job.programare.status='viitor';
  await saveJob(job);
  toast(T('reactivat'));
  render();
};

    await saveJob(j);

  if(!isAdmin()){toast(T('admin_only'),1);return}
